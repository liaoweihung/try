<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藥局盤點系統</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
    h2 { text-align: center; color: #2c3e50; }
    .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    select, input[type="number"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 15px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
    button:active { filter: brightness(0.9); }
    button:disabled { background-color: #95a5a6 !important; cursor: not-allowed; }
    .drug-item { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
    .drug-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
    .drug-spec { font-size: 14px; color: #e67e22; font-weight: normal; margin-left: 5px; }
    .drug-code { font-size: 14px; color: #7f8c8d; margin-bottom: 10px; }
    .input-group { display: flex; align-items: center; }
    .input-group input { margin-bottom: 0; flex: 1; }
    .input-unit { margin-left: 10px; font-size: 16px; font-weight: bold; color: #2c3e50; min-width: 30px; }
    .hidden { display: none; }
    .history-item { border-bottom: 1px dashed #ccc; padding: 10px 0; }
    .history-item:last-child { border-bottom: none; }
    .history-title { font-weight: bold; color: #2980b9; margin-bottom: 5px; }
    .history-details { color: #555; font-size: 14px; line-height: 1.5; }
    .qty-highlight { color: #e74c3c; font-weight: bold; }
  </style>
</head>
<body>

  <h2>📋 全院大盤點</h2>

  <div id="setup-section" class="card">
    <label for="main-area">1. 盤點大區：</label>
    <select id="main-area" onchange="updateSubArea()">
      <option value="" disabled selected>請選擇大區...</option>
    </select>

    <label id="sub-area-label" for="sub-area">2. 自動分類小區：</label>
    <select id="sub-area" onchange="updateCabinet()">
      <option value="" disabled selected>請先選擇上方的大區</option>
    </select>

    <label id="cabinet-label" for="cabinet">3. 實際櫃位：</label>
    <select id="cabinet">
      <option value="" disabled selected>請先選擇上方的小區</option>
    </select>

    <button onclick="startInventory()" style="margin-top: 15px;">開始盤點此區</button>
  </div>

  <div id="inventory-section" class="card hidden">
    <div id="current-info" style="margin-bottom: 15px; font-weight: bold; color: #e67e22; font-size: 18px;"></div>
    
    <div style="margin-bottom: 15px; background-color: #fff3cd; padding: 12px; border-radius: 8px; border-left: 5px solid #ffc107;">
      <label style="display: flex; align-items: center; cursor: pointer; font-size: 16px; font-weight: bold; color: #856404; margin: 0;">
        <input type="checkbox" id="recount-mode" style="width: 20px; height: 20px; margin-right: 10px;">
        🔄 覆盤模式 (僅送出有填數字的藥品)
      </label>
    </div>

    <div id="drug-list"></div>
    
    <div style="margin-top: 20px; border-top: 2px dashed #eee; padding-top: 15px;">
      <label style="color: #e74c3c;">📝 突發狀況筆記 (選填)：</label>
      <textarea id="cabinet-note" rows="2" placeholder="例如：包裝破損、批號不一、漏點..." 
        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box;"></textarea>
    </div>
    
    <button id="submit-btn" style="background-color: #27ae60;" onclick="submitData()">送出並繼續 (連線)</button>
    <button style="background-color: #95a5a6; margin-top: 10px;" onclick="backToSetup()">返回重選</button>
  </div>

  <div style="background: #fff8e1; border: 2px solid #ffe082; padding: 15px; border-radius: 8px; margin: 15px 0;">
    <label style="display: flex; align-items: center; cursor: pointer; font-size: 18px; font-weight: bold; color: #b98100;">
      <input type="checkbox" id="offline-toggle" style="width: 25px; height: 25px; margin-right: 10px;">
      啟用「盤點資料暫存在手機」模式
    </label>
    <div style="margin-top: 15px; border-top: 1px dashed #ffe082; padding-top: 15px;">
      目前手機暫存：<span id="offline-count" style="font-size: 24px; font-weight: bold; color: #d32f2f;">0</span> 筆
      <button onclick="processOfflineQueue()" id="btn-upload-offline" style="width: 100%; padding: 12px; margin-top: 10px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
        ☁️ 一鍵全部上傳
      </button>
    </div>
  </div>

  <div id="history-section" class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <h3 style="margin: 0; color: #2c3e50;">🕒 本機盤點紀錄</h3>
      <button onclick="clearHistory()" style="width: auto; padding: 5px 10px; font-size: 12px; background-color: #e74c3c;">清除紀錄</button>
    </div>
    <div id="history-list" style="font-size: 14px; color: #7f8c8d;">尚無紀錄</div>
  </div>

  <script>
    // ⚠️ 請務必替換為您的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec";

    const db = {};
    
    // 💡 將陣列定義移到最上方，確保所有函數都能讀取到
    let localHistory = JSON.parse(localStorage.getItem("inventoryHistory")) || [];
    let offlineQueue = JSON.parse(localStorage.getItem("offlineQueue")) || [];

    // 🎨 監聽離線開關，動態改變按鈕顏色與文字
    window.addEventListener('load', () => {
      updateOfflineUI();
      const toggle = document.getElementById('offline-toggle');
      if (toggle) {
        toggle.addEventListener('change', function() {
          const btn = document.getElementById('submit-btn');
          if (this.checked) {
            btn.innerText = "📥 暫存至手機 (離線)";
            btn.style.backgroundColor = "#f39c12"; // 橘黃色
          } else {
            btn.innerText = "送出並繼續 (連線)";
            btn.style.backgroundColor = "#27ae60"; // 綠色
          }
        });
      }
    });

    // 核心分類引擎 (保留您修正過的版本)
    function classifySubAreas(cabName, mainArea, unit) {
      if (mainArea === "中山") {
        const u = String(unit || "").toUpperCase();
        if (u === "CAPS" || u === "TABL") return ["口服"];
        if (u === "TUBE" || u === "BTL" || u === "PACH" || u === "SACH") return ["外用"];
        if (u === "AMPU") return ["注射"];
        if (cabName === "未設儲位") return ["未設儲位"];
        return ["其他(中山)"];
      }
      
      if (cabName === "未設儲位") return ["未設儲位"];
      if (cabName === "門地下一") return ["門診區地下一層"];
      if (cabName === "住地下一") return ["住院藥局(地下一層)"];

      switch (mainArea) {
        case "門診":
          if (cabName.startsWith("調3")) return ["調3"];
          if (cabName.startsWith("ADC")) return ["ADC藥櫃"];
          if (cabName.startsWith("水")) return ["水藥台"];
          if (cabName.startsWith("專案")) return ["專案櫃"];
          if (cabName.startsWith("門冰")) return ["門冰"];
          if (cabName.startsWith("調2")) return ["調2特有"];
          if (cabName.startsWith("審")) return ["審核區"];
          if (cabName.startsWith("注射室")) return ["注射室"];
          if (cabName.startsWith("管4庫")) return ["管4庫"];
          if (cabName.startsWith("點滴")) return ["點滴區"];
          if (cabName.startsWith("磨粉區")) return ["磨粉區"];
          if (cabName.startsWith("化療室")) return ["化療室"];
          if (cabName.startsWith("藥包機")) return ["藥包機"];
          return ["調劑檯1", "調劑檯2", "調劑檯4"];

        case "急診":
          if (cabName === "B1冷凍" || cabName.startsWith("B1冷凍")) return ["B1冷凍"];
          if (cabName.startsWith("ER_")) return ["ER_"];
          const enMatch = cabName.match(/^[a-zA-Z]+/);
          if (enMatch) return [enMatch[0].toUpperCase()]; 
          if (/^[\u4e00-\u9fa5]/.test(cabName)) return [cabName.replace(/\d$/, '')];
          return [cabName];

        case "中山":
          const u = String(unit || "").toUpperCase();
          if (u === "CAP" || u === "TABL") return ["口服"];
          if (u === "TUBE" || u === "BTL" || u === "PATCH" || u === "SACH") return ["外用"];
          if (u === "AMPU") return ["注射"];
          return ["其他(中山)"];

        case "藥庫":
          if (cabName.includes("心/內")) return ["E3"];
          const rackMatch = cabName.match(/^[a-zA-Z]+[左右]?\d+/);
          if (rackMatch) return [rackMatch[0]]; 
          if (cabName.includes("-")) return [cabName.split("-")[0]];
          return [cabName];
          
        case "化療":
          return ["全部品項"];

        default:
          return ["全部品項"];
      }
    }

    window.onload = async function() {
      const mainSelect = document.getElementById("main-area");
      const startBtn = document.querySelector("button[onclick='startInventory()']");
      
      mainSelect.innerHTML = '<option value="" disabled selected>⏳ 藥品資料庫載入中...</option>';
      if(startBtn) startBtn.disabled = true;

      try {
        const response = await fetch(GAS_URL + "?action=getDrugs");
        const rawData = await response.json();

        mainSelect.innerHTML = '<option value="" disabled selected>請選擇大區...</option>';
        if(startBtn) startBtn.disabled = false;

        rawData.forEach(row => {
          const code = String(row[0] || "").trim();
          if (!code) return; 
          
          const name = String(row[1] || "").trim();
          const spec = String(row[2] || "").trim();
          const unit = String(row[3] || "").trim(); 
          const cab1 = String(row[4] || "").trim(); 
          const cab2 = String(row[5] || "").trim(); 
          const mainArea = String(row[6] || "").trim();

          if (!mainArea) return; 

          let rawCabinets = [];
          if (cab1) rawCabinets.push(...cab1.split(/[,、，+/]/).map(s => s.trim()).filter(s => s));
          if (cab2) rawCabinets.push(...cab2.split(/[,、，+/]/).map(s => s.trim()).filter(s => s));
          if (rawCabinets.length === 0) rawCabinets.push("未設儲位");

          if (!db[mainArea]) db[mainArea] = {};

          rawCabinets.forEach(cab => {
            const subAreas = classifySubAreas(cab, mainArea, unit);
            subAreas.forEach(sub => {
              if (!db[mainArea][sub]) db[mainArea][sub] = {};
              if (!db[mainArea][sub][cab]) db[mainArea][sub][cab] = [];
              if (!db[mainArea][sub][cab].some(d => d.code === code)) {
                 db[mainArea][sub][cab].push({ code: code, name: name, spec: spec, unit: unit });
              }
            });
          });
        });

        Object.keys(db).sort().forEach(area => {
           const opt = document.createElement("option");
           opt.value = area;
           opt.innerText = area;
           mainSelect.appendChild(opt);
        });

        renderHistory();
        updateOfflineUI(); // 確保開頭呼叫一次
      } catch(error) {
        alert("❌ 載入失敗，請檢查網路或確認 GAS 網址是否正確！");
        mainSelect.innerHTML = '<option value="" disabled selected>連線失敗，請重新整理網頁</option>';
      }
    };

    function updateSubArea() {
      const mainArea = document.getElementById("main-area").value;
      const subSelect = document.getElementById("sub-area");
      const cabSelect = document.getElementById("cabinet");

      subSelect.innerHTML = '<option value="" disabled selected>請選擇小區...</option>';
      cabSelect.innerHTML = '<option value="" disabled selected>請先選擇上方的小區</option>';
      
      if (db[mainArea]) {
        const subAreas = Object.keys(db[mainArea]).sort();
        if (subAreas.length === 1 && subAreas[0] === "全部品項") {
            subSelect.innerHTML = '<option value="全部品項" selected>全部品項</option>';
            updateCabinet(); 
        } else {
            subAreas.forEach(sub => {
              const opt = document.createElement("option");
              opt.value = sub;
              opt.innerText = sub;
              subSelect.appendChild(opt);
            });
        }
      }
    }

    function updateCabinet() {
      const mainArea = document.getElementById("main-area").value;
      const subArea = document.getElementById("sub-area").value;
      const cabSelect = document.getElementById("cabinet");
      
      cabSelect.innerHTML = '<option value="" disabled selected>請選擇儲位...</option>';
      
      if (db[mainArea] && db[mainArea][subArea]) {
        const cabinets = Object.keys(db[mainArea][subArea]).sort();

        if (cabinets.length === 1 && cabinets[0] === "全部品項") {
          cabSelect.innerHTML = '<option value="全部品項" selected>全部品項</option>';
        } else {
          cabinets.forEach(cab => {
            const opt = document.createElement("option");
            opt.value = cab;
            
            const deskString = mainArea + "-" + subArea;
            // 🔎 檢查是否已上傳 或 已暫存
            const isCached = offlineQueue.some(q => q.desk === deskString && q.location === cab);
            const isDone = localHistory.some(h => h.desk === deskString && h.loc === cab);
            
            if (isCached) {
              opt.innerText = cab + " ⏳ (暫存)";
            } else if (isDone) {
              opt.innerText = cab + " ✅ (已盤)";
            } else {
              opt.innerText = cab;
            }
            
            cabSelect.appendChild(opt);
          });
        }
      }
    }

    function startInventory() {
      const mainArea = document.getElementById("main-area").value;
      const subArea = document.getElementById("sub-area").value;
      const cabinet = document.getElementById("cabinet").value;

      if (!mainArea || !subArea || !cabinet) {
        alert("請完整選擇大區、小區與櫃位！");
        return;
      }

      const cabText = cabinet === "全部品項" ? "" : ` - ${cabinet}`;
      document.getElementById("current-info").innerText = `📍 目前：${mainArea} - ${subArea}${cabText}`;
      
      const listDiv = document.getElementById("drug-list");
      listDiv.innerHTML = ""; 
      
      const drugs = db[mainArea][subArea][cabinet] || [];
      const deskString = mainArea + "-" + subArea;
      const pastRecord = localHistory.find(h => h.desk === deskString && h.loc === cabinet);
      
      drugs.forEach(drug => {
        let pastQty = "";
        if (pastRecord) {
            const pastItem = pastRecord.items.find(i => i.drugCode === drug.code);
            if (pastItem) pastQty = pastItem.qty;
        }

        const html = `
          <div class="drug-item">
            <div class="drug-name">${drug.name} <span class="drug-spec">(${drug.spec})</span></div>
            <div class="drug-code">代碼：${drug.code}</div>
            <div class="input-group">
               <input type="number" data-code="${drug.code}" data-name="${drug.name}" placeholder="請輸入數量" inputmode="numeric" pattern="[0-9]*" min="0" value="${pastQty}">
               <div class="input-unit">${drug.unit}</div>
            </div>
          </div>
        `;
        listDiv.innerHTML += html;
      });

      document.getElementById("setup-section").classList.add("hidden");
      document.getElementById("history-section").classList.add("hidden");
      document.getElementById("inventory-section").classList.remove("hidden");
    }

    function submitData() {
      const note = document.getElementById("cabinet-note").value; 
      const mainArea = document.getElementById("main-area").value;
      const subArea = document.getElementById("sub-area").value;
      const deskString = mainArea + "-" + subArea; 
      const loc = document.getElementById("cabinet").value;
      const inputs = document.querySelectorAll("#drug-list input[type='number']");
      const isRecount = document.getElementById('recount-mode').checked;

      let itemsToSubmit = [];
      let hasEmpty = false;

      inputs.forEach(input => {
        const qty = input.value;
        if (qty === "") hasEmpty = true; 
        
        if (isRecount) {
          if (qty !== "") itemsToSubmit.push({ drugCode: input.getAttribute("data-code"), drugName: input.getAttribute("data-name"), qty: qty });
        } else {
          itemsToSubmit.push({ drugCode: input.getAttribute("data-code"), drugName: input.getAttribute("data-name"), qty: qty || 0 });
        }
      });

      if (isRecount && itemsToSubmit.length === 0) {
        alert("⚠️ 覆盤模式下，請至少輸入一個要修改的藥品數量！");
        return;
      }

      if (!isRecount && hasEmpty) {
        if (!confirm("⚠️ 有部分藥品未填寫數量，系統將自動填入 0 送出，確定嗎？")) return;
      }

      const payload = {
        desk: deskString, 
        location: loc,    
        items: itemsToSubmit,
        mode: isRecount ? "partial" : "full",
        note: note
      };

      // 🛑 先檢查是否為「離線暫存模式」
      const isOffline = document.getElementById("offline-toggle") && document.getElementById("offline-toggle").checked;
      
      if (isOffline) {
        offlineQueue.push(payload); 
        localStorage.setItem("offlineQueue", JSON.stringify(offlineQueue));
        updateOfflineUI();
        
        // 將紀錄寫入本機歷史 (標記為暫存)
        const now = new Date();
        const timeString = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        let existingIndex = localHistory.findIndex(h => h.desk === deskString && h.loc === loc);
        if (existingIndex !== -1) localHistory.splice(existingIndex, 1);
        localHistory.unshift({ time: timeString, desk: deskString, loc: loc, items: itemsToSubmit, note: note ? "(暫存) " + note : "(暫存中尚未上傳)" });
        localStorage.setItem("inventoryHistory", JSON.stringify(localHistory));

        alert("✅ 資料已暫存於手機中！");
        
        // 🧹 完美還原畫面與清空資料
        document.getElementById('cabinet-note').value = ''; 
        document.getElementById('recount-mode').checked = false; 
        document.getElementById('drug-list').innerHTML = ''; 
        renderHistory();   
        updateCabinet(); // 更新下拉選單，顯示 ⏳ 圖示
        backToSetup();
        
        return; // 終止函數，不再往下執行網路連線
      }

      // 👇 如果沒有開啟離線模式，就會走原本的網路傳送
      const btn = document.getElementById("submit-btn");
      const originalText = btn.innerText;
      btn.innerText = "資料傳送中...";
      btn.disabled = true;

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === "success") {
          alert("✅ 送出成功！");
          document.getElementById('cabinet-note').value = ''; 
          
          const now = new Date();
          const timeString = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
          let existingIndex = localHistory.findIndex(h => h.desk === deskString && h.loc === loc);
          
          if (isRecount && existingIndex !== -1) {
            itemsToSubmit.forEach(newItem => {
              let itemIndex = localHistory[existingIndex].items.findIndex(i => i.drugCode === newItem.drugCode);
              if (itemIndex !== -1) localHistory[existingIndex].items[itemIndex].qty = newItem.qty;
              else localHistory[existingIndex].items.push(newItem);
            });
            if (note) localHistory[existingIndex].note = localHistory[existingIndex].note ? (localHistory[existingIndex].note + " | " + note) : note;
            localHistory[existingIndex].time = timeString;
            let updatedRecord = localHistory.splice(existingIndex, 1)[0];
            localHistory.unshift(updatedRecord);
          } else {
            if (existingIndex !== -1) localHistory.splice(existingIndex, 1);
            localHistory.unshift({ time: timeString, desk: deskString, loc: loc, items: itemsToSubmit, note: note });
          }
          
          localStorage.setItem("inventoryHistory", JSON.stringify(localHistory));
          renderHistory();   
          updateCabinet();   
          document.getElementById('recount-mode').checked = false; 
          document.getElementById('drug-list').innerHTML = ''; 
          backToSetup(); 
        } else {
          alert("❌ 送出失敗：" + data.message);
        }
      })
      .catch(error => { alert("❌ 網路錯誤，請檢查連線後重試！"); })
      .finally(() => { btn.innerText = originalText; btn.disabled = false; });
    }

    function backToSetup() {
      document.getElementById("setup-section").classList.remove("hidden");
      document.getElementById("history-section").classList.remove("hidden");
      document.getElementById("inventory-section").classList.add("hidden");
      const cabSelect = document.getElementById("cabinet");
      if(cabSelect.options.length > 1) cabSelect.value = ""; 
    }

    function renderHistory() {
      const listDiv = document.getElementById("history-list");
      if (localHistory.length === 0) {
        listDiv.innerHTML = "尚無紀錄";
        return;
      }
      let html = "";
      localHistory.forEach(record => {
        let details = record.items.map(i => `${i.drugName}: <span class="qty-highlight">${i.qty}</span>`).join('<br>');
        let locText = record.loc === "全部品項" ? "" : `- ${record.loc}`;
        let noteHtml = record.note ? `<div style="color: #e74c3c; margin-top: 5px; font-weight: bold;">📝 筆記：${record.note}</div>` : "";
        html += `<div class="history-item"><div class="history-title">${record.time} | ${record.desk} ${locText}</div><div class="history-details">${details}${noteHtml}</div></div>`;
      });
      listDiv.innerHTML = html;
    }

    function clearHistory() {
      if (confirm("確定要清除手機上的所有盤點紀錄嗎？(不會影響已經上傳到試算表的資料)")) {
        localStorage.removeItem("inventoryHistory");
        localHistory = [];
        renderHistory();
        updateSubArea(); 
      }
    }

    // ==========================================
    // 📦 離線暫存大管家系統
    // ==========================================
    function updateOfflineUI() {
      const countSpan = document.getElementById("offline-count");
      if(countSpan) countSpan.innerText = offlineQueue.length;
    }

    async function processOfflineQueue() {
      if (offlineQueue.length === 0) return alert("目前手機內沒有暫存資料喔！");

      const btn = document.getElementById("btn-upload-offline");
      btn.innerText = "上傳中，請勿關閉畫面 ⏳...";
      btn.disabled = true;

      let successCount = 0;
      const total = offlineQueue.length;

      for (let i = 0; i < total; i++) {
        try {
          const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(offlineQueue[0]) 
          });
          
          const result = await response.json();
          
          if (result.status === "success") {
            successCount++;
            offlineQueue.shift(); 
            localStorage.setItem("offlineQueue", JSON.stringify(offlineQueue));
            updateOfflineUI();
          }
        } catch(e) {
          console.error("網路異常中斷");
          break; 
        }
      }

      btn.innerText = "☁️ 一鍵全部上傳";
      btn.disabled = false;
      
      // 🌟 上傳完畢後，強制更新下拉選單的圖示 (⏳ 變成 ✅)
      updateCabinet(); 

      if (offlineQueue.length === 0) {
        alert("🎉 太棒了！所有暫存資料已全數上傳成功！");
      } else {
        alert(`已成功上傳 ${successCount} 筆。剩餘 ${offlineQueue.length} 筆傳送失敗，請移至網路良好處再按一次上傳。`);
      }
    }
  </script>
</body>
</html>
