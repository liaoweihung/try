<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藥局盤點系統</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
    h2 { text-align: center; color: #2c3e50; }
    .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    select, input[type="number"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 15px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    button:active { background-color: #2980b9; }
    button:disabled { background-color: #95a5a6; cursor: not-allowed; }
    .drug-item { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
    .drug-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
    .drug-code { font-size: 14px; color: #7f8c8d; margin-bottom: 10px; }
    .hidden { display: none; }
    /* 歷史紀錄專用樣式 */
    .history-item { border-bottom: 1px dashed #ccc; padding: 10px 0; }
    .history-item:last-child { border-bottom: none; }
    .history-title { font-weight: bold; color: #2980b9; margin-bottom: 5px; }
    .history-details { color: #555; font-size: 14px; line-height: 1.5; }
    .qty-highlight { color: #e74c3c; font-weight: bold; }
  </style>
</head>
<body>

  <h2>📋 藥局盤點系統</h2>

  <!-- 設定區塊 -->
  <div id="setup-section" class="card">
    <label for="main-area">1. 大區：</label>
    <select id="main-area" onchange="updateSubArea()">
      <option value="" disabled selected>請選擇大區...</option>
    </select>

    <label id="sub-area-label" for="sub-area">2. 小區：</label>
    <select id="sub-area" onchange="updateCabinet()">
      <option value="" disabled selected>請先選擇上方的大區</option>
    </select>

    <label id="cabinet-label" for="cabinet">3. 櫃位：</label>
    <select id="cabinet">
      <option value="" disabled selected>請先選擇上方的小區</option>
    </select>

    <button onclick="startInventory()" style="margin-top: 15px;">開始盤點此區</button>
  </div>

  <!-- 盤點輸入區塊 -->
  <div id="inventory-section" class="card hidden">
    <div id="current-info" style="margin-bottom: 15px; font-weight: bold; color: #e67e22;"></div>
    <div id="drug-list"></div>
    <div style="margin-top: 20px; border-top: 2px dashed #eee; padding-top: 15px;">
  <label style="color: #e74c3c;">📝 突發狀況筆記 (選填)：</label>
  <textarea id="cabinet-note" rows="2" placeholder="例如：包裝破損、批號不一、漏點..." 
    style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box;"></textarea>
</div>
    <!-- 新增的覆盤模式開關 -->
<div style="margin-bottom: 15px; background-color: #fff3cd; padding: 12px; border-radius: 8px; border-left: 5px solid #ffc107;">
  <label style="display: flex; align-items: center; cursor: pointer; font-size: 16px; font-weight: bold; color: #856404; margin: 0;">
    <input type="checkbox" id="recount-mode" style="width: 20px; height: 20px; margin-right: 10px;">
    🔄 單藥覆盤模式 (保留同櫃位其他藥)
  </label>
</div>
    <button id="submit-btn" style="background-color: #27ae60;" onclick="submitData()">送出並繼續</button>
    <button style="background-color: #95a5a6; margin-top: 10px;" onclick="backToSetup()">返回重選</button>
  </div>

  <!-- 歷史紀錄區塊 (新增) -->
  <div id="history-section" class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <h3 style="margin: 0; color: #2c3e50;">🕒 本機盤點紀錄</h3>
      <button onclick="clearHistory()" style="width: auto; padding: 5px 10px; font-size: 12px; background-color: #e74c3c;">清除紀錄</button>
    </div>
    <div id="history-list" style="font-size: 14px; color: #7f8c8d;">尚無紀錄</div>
  </div>
  <script>
// ⚠️ 請替換為您的 GAS Web App 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec";

    const db = {};
    // 讀取手機本地的歷史紀錄
    let localHistory = JSON.parse(localStorage.getItem("inventoryHistory")) || [];

// 💡 唯一的新版載入邏輯 (修復資料格式不相容問題)
    window.onload = async function() {
      const mainSelect = document.getElementById("main-area");
      const startBtn = document.querySelector("button[onclick='startInventory()']");
      
      mainSelect.innerHTML = '<option value="" disabled selected>⏳ 藥品資料庫載入中...</option>';
      if(startBtn) startBtn.disabled = true;

      try {
        const response = await fetch(GAS_URL + "?action=getDrugs");
        const rawExcelData = await response.json();

        mainSelect.innerHTML = '<option value="" disabled selected>請選擇大區...</option>';
        if(startBtn) startBtn.disabled = false;

        rawExcelData.forEach(row => {
          // 💡 關鍵修復：將 GAS 回傳的 JSON 物件，轉回原本程式習慣的陣列排序
          const cols = Object.values(row);

          const code = cols[0];
          if (!code) return; // 避免抓到空白行出錯

          const name = cols[1] + (cols[2] ? " (" + cols[2] + ")" : "");
          const rawCabinet = String(cols[4] || "").trim();
          const rawSubAreas = [cols[5], cols[6]].map(s => String(s || "").trim()).filter(s => s !== "" && s !== "undefined");
          const rawMainAreas = [cols[7], cols[8]].map(s => String(s || "").trim()).filter(s => s !== "" && s !== "undefined");

          rawMainAreas.forEach(mainArea => {
            if (!db[mainArea]) db[mainArea] = {};

            if (mainArea === "中山") {
               if (!db[mainArea]["中山藥局"]) db[mainArea]["中山藥局"] = {};
               if (!db[mainArea]["中山藥局"]["全部品項"]) db[mainArea]["中山藥局"]["全部品項"] = [];
               if (!db[mainArea]["中山藥局"]["全部品項"].some(d => d.code === code)) {
                 db[mainArea]["中山藥局"]["全部品項"].push({ code: code, name: name });
               }
            } else {
               let subAreas = rawSubAreas.length > 0 ? rawSubAreas : ["未分類"];
               subAreas.forEach(sub => {
                  let expandedSubs = [sub];
                  if (sub === "調劑檯") expandedSubs = ["調劑檯1", "調劑檯2", "調劑檯3"];

                  expandedSubs.forEach(finalSub => {
                     let finalCabinet = rawCabinet;
                     if (finalSub.includes("庫") || !finalCabinet) finalCabinet = "全部品項";

                     if (!db[mainArea][finalSub]) db[mainArea][finalSub] = {};
                     if (!db[mainArea][finalSub][finalCabinet]) db[mainArea][finalSub][finalCabinet] = [];
                     if (!db[mainArea][finalSub][finalCabinet].some(d => d.code === code)) {
                       db[mainArea][finalSub][finalCabinet].push({ code: code, name: name });
                     }
                  });
               });
            }
          });
        });

        Object.keys(db).forEach(area => {
           const opt = document.createElement("option");
           opt.value = area;
           opt.innerText = area;
           mainSelect.appendChild(opt);
        });

        renderHistory();

      } catch(error) {
        alert("❌ 載入藥品資料庫失敗，請檢查網路連線或稍後重試！");
        mainSelect.innerHTML = '<option value="" disabled selected>連線失敗，請重新整理網頁</option>';
      }
    };
    function updateSubArea() {
      const mainArea = document.getElementById("main-area").value;
      const subSelect = document.getElementById("sub-area");
      const subLabel = document.getElementById("sub-area-label");
      const cabSelect = document.getElementById("cabinet");
      const cabLabel = document.getElementById("cabinet-label");

      subSelect.innerHTML = '<option value="" disabled selected>請選擇小區...</option>';
      cabSelect.innerHTML = '<option value="" disabled selected>請先選擇上方的小區</option>';
      
      subSelect.style.display = 'block';
      subLabel.style.display = 'block';
      cabSelect.style.display = 'block';
      cabLabel.style.display = 'block';

      if (db[mainArea]) {
        const subAreas = Object.keys(db[mainArea]).sort();

        if (subAreas.length === 1 && subAreas[0] === "中山藥局") {
            subSelect.innerHTML = '<option value="中山藥局" selected>中山藥局</option>';
            subSelect.style.display = 'none';
            subLabel.style.display = 'none';
            updateCabinet(); 
        } else {
            subAreas.forEach(sub => {
              const opt = document.createElement("option");
              opt.value = sub;
              opt.innerText = sub;
              subSelect.appendChild(opt);
            });
        }
      }
    }

    function updateCabinet() {
      const mainArea = document.getElementById("main-area").value;
      const subArea = document.getElementById("sub-area").value;
      const cabSelect = document.getElementById("cabinet");
      const cabLabel = document.getElementById("cabinet-label");

      cabSelect.innerHTML = '<option value="" disabled selected>請選擇櫃位...</option>';
      cabSelect.style.display = 'block';
      cabLabel.style.display = 'block';

      if (db[mainArea] && db[mainArea][subArea]) {
        const cabinets = Object.keys(db[mainArea][subArea]).sort();

        if (cabinets.length === 1 && cabinets[0] === "全部品項") {
          cabSelect.innerHTML = '<option value="全部品項" selected>全部品項</option>';
          cabSelect.style.display = 'none';
          cabLabel.style.display = 'none';
        } else {
          cabinets.forEach(cab => {
            const opt = document.createElement("option");
            opt.value = cab;
            
            const deskString = mainArea + "-" + subArea;
            const isDone = localHistory.some(h => h.desk === deskString && h.loc === cab);
            opt.innerText = isDone ? cab + " ✅ (已盤)" : cab;
            
            cabSelect.appendChild(opt);
          });
        }
      }
    }

    function startInventory() {
      const mainArea = document.getElementById("main-area").value;
      const subArea = document.getElementById("sub-area").value;
      const cabinet = document.getElementById("cabinet").value;

      if (!mainArea || !subArea || !cabinet) {
        alert("請完整選擇區域！");
        return;
      }

      const cabText = cabinet === "全部品項" ? "" : ` - 櫃位 ${cabinet}`;
      document.getElementById("current-info").innerText = `目前：${mainArea} - ${subArea}${cabText}`;
      
      const listDiv = document.getElementById("drug-list");
      listDiv.innerHTML = ""; 
      
      const drugs = db[mainArea][subArea][cabinet] || [];
      
      const deskString = mainArea + "-" + subArea;
      const pastRecord = localHistory.find(h => h.desk === deskString && h.loc === cabinet);
      
      drugs.forEach(drug => {
        let pastQty = "";
        if (pastRecord) {
            const pastItem = pastRecord.items.find(i => i.drugCode === drug.code);
            if (pastItem) pastQty = pastItem.qty;
        }

        const html = `
          <div class="drug-item">
            <div class="drug-name">${drug.name}</div>
            <div class="drug-code">代碼：${drug.code}</div>
            <input type="number" data-code="${drug.code}" data-name="${drug.name}" placeholder="請輸入數量" inputmode="numeric" pattern="[0-9]*" min="0" value="${pastQty}">
          </div>
        `;
        listDiv.innerHTML += html;
      });

      document.getElementById("setup-section").classList.add("hidden");
      document.getElementById("history-section").classList.add("hidden");
      document.getElementById("inventory-section").classList.remove("hidden");
    }

    function submitData() {
      const note = document.getElementById("cabinet-note").value; 
      const mainArea = document.getElementById("main-area").value;
      const subArea = document.getElementById("sub-area").value;
      const deskString = mainArea + "-" + subArea;
      const loc = document.getElementById("cabinet").value;
      const inputs = document.querySelectorAll("#drug-list input[type='number']");
      
      const isRecount = document.getElementById('recount-mode').checked;

      let itemsToSubmit = [];
      let hasEmpty = false;

      inputs.forEach(input => {
        const qty = input.value;
        if (qty === "") hasEmpty = true; 
        
        if (isRecount) {
          if (qty !== "") {
            itemsToSubmit.push({
              drugCode: input.getAttribute("data-code"),
              drugName: input.getAttribute("data-name"),
              qty: qty
            });
          }
        } else {
          itemsToSubmit.push({
            drugCode: input.getAttribute("data-code"),
            drugName: input.getAttribute("data-name"),
            qty: qty || 0 
          });
        }
      });

      if (isRecount && itemsToSubmit.length === 0) {
        alert("⚠️ 覆盤模式下，請至少輸入一個要修改的藥品數量！");
        return;
      }

      if (!isRecount && hasEmpty) {
        if (!confirm("⚠️ 有部分藥品未填寫數量，系統將自動填入 0 送出，確定嗎？")) {
          return;
        }
      }

      const payload = {
        desk: deskString,
        location: loc,
        items: itemsToSubmit,
        mode: isRecount ? "partial" : "full",
        note: note
      };

      const btn = document.querySelector("button[onclick='submitData()']");
      const originalText = btn.innerText;
      btn.innerText = "資料傳送中...";
      btn.disabled = true;

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === "success") {
          alert("✅ 送出成功！");
          
          document.getElementById('cabinet-note').value = ''; 
          
          const now = new Date();
          const timeString = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
          let existingIndex = localHistory.findIndex(h => h.desk === deskString && h.loc === loc);
          
          if (isRecount && existingIndex !== -1) {
            itemsToSubmit.forEach(newItem => {
              let itemIndex = localHistory[existingIndex].items.findIndex(i => i.drugCode === newItem.drugCode);
              if (itemIndex !== -1) {
                localHistory[existingIndex].items[itemIndex].qty = newItem.qty;
              } else {
                localHistory[existingIndex].items.push(newItem);
              }
            });
            if (note) {
              localHistory[existingIndex].note = localHistory[existingIndex].note ? (localHistory[existingIndex].note + " | " + note) : note;
            }
            localHistory[existingIndex].time = timeString;
            let updatedRecord = localHistory.splice(existingIndex, 1)[0];
            localHistory.unshift(updatedRecord);
          } else {
            if (existingIndex !== -1) localHistory.splice(existingIndex, 1);
            localHistory.unshift({
              time: timeString,
              desk: deskString,
              loc: loc,
              items: itemsToSubmit,
              note: note 
            });
          }
          
          localStorage.setItem("inventoryHistory", JSON.stringify(localHistory));
          
          renderHistory();   
          updateCabinet();   
          document.getElementById('recount-mode').checked = false; 
          document.getElementById('drug-list').innerHTML = ''; 
          backToSetup(); 
          
        } else {
          alert("❌ 送出失敗：" + data.message);
        }
      })
      .catch(error => {
        alert("❌ 網路錯誤，請檢查連線後重試！");
      })
      .finally(() => {
        btn.innerText = originalText;
        btn.disabled = false;
      });
    }

    function backToSetup() {
      document.getElementById("setup-section").classList.remove("hidden");
      document.getElementById("history-section").classList.remove("hidden");
      document.getElementById("inventory-section").classList.add("hidden");
      
      const cabSelect = document.getElementById("cabinet");
      if(cabSelect.style.display !== 'none') cabSelect.value = ""; 
    }

    function renderHistory() {
      const listDiv = document.getElementById("history-list");
      if (localHistory.length === 0) {
        listDiv.innerHTML = "尚無紀錄";
        return;
      }

      let html = "";
      localHistory.forEach(record => {
        let details = record.items.map(i => `${i.drugName}: <span class="qty-highlight">${i.qty}</span>`).join('<br>');
        let locText = record.loc === "全部品項" ? "" : `- 櫃位 ${record.loc}`;
        
        let noteHtml = record.note ? `<div style="color: #e74c3c; margin-top: 5px; font-weight: bold;">📝 筆記：${record.note}</div>` : "";
        
        html += `
          <div class="history-item">
            <div class="history-title">${record.time} | ${record.desk} ${locText}</div>
            <div class="history-details">
              ${details}
              ${noteHtml} 
            </div>
          </div>
        `;
      });
      listDiv.innerHTML = html;
    }

    function clearHistory() {
      if (confirm("確定要清除手機上的所有盤點紀錄嗎？(不會影響已經上傳到試算表的資料)")) {
        localStorage.removeItem("inventoryHistory");
        localHistory = [];
        renderHistory();
        updateCabinet(); 
      }
    }
 </script>
</body>
</html>
