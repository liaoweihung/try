<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全院大盤點 - 藥局盤點系統</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 15px; color: #333; margin: 0; }
    h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
    .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
    label { font-weight: bold; color: #2980b9; display: block; margin-bottom: 5px; font-size: 14px; }
    input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    input:disabled { background-color: #eee; color: #666; }
    
    .flex-row { display: flex; gap: 10px; }
    .flex-row > div { flex: 1; }
    
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    .btn-add { background-color: #3498db; color: white; margin-bottom: 10px; }
    .btn-add:hover { background-color: #2980b9; }
    .btn-submit { background-color: #27ae60; color: white; margin-top: 15px; padding: 15px; font-size: 18px; }
    .btn-submit:hover { background-color: #219a52; }
    .btn-remove { background-color: #e74c3c; color: white; padding: 6px 10px; font-size: 12px; width: auto; border-radius: 5px; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
    th { background: #f8f9fa; padding: 10px; border-bottom: 2px solid #ddd; text-align: left; font-size: 14px; color: #7f8c8d; }
    td { padding: 10px; border-bottom: 1px solid #eee; font-size: 15px; vertical-align: middle; }
    .total-badge { background: #e8f4fd; color: #2980b9; padding: 3px 8px; border-radius: 12px; font-size: 14px; float: right; }
  </style>
</head>
<body>

  <h2>📦 全院大盤點作業</h2>

  <div class="card">
    <div class="flex-row">
      <div>
        <label>👤 工作檯 / 盤點人</label>
        <input type="text" id="input-desk" placeholder="例如：A檯 小明">
      </div>
      <div>
        <label>📍 盤點區域</label>
        <input type="text" id="input-loc" placeholder="例如：門診-調劑檯">
      </div>
    </div>
    <label>📝 備註 (選填)</label>
    <input type="text" id="input-note" placeholder="如有特殊狀況請填寫">
  </div>

  <div class="card" style="border-left: 5px solid #3498db;">
    <h3 style="margin-top: 0; color: #2c3e50; font-size: 16px;">➕ 新增盤點藥品 <span id="db-status" style="font-size: 12px; color: #e67e22; font-weight: normal;">(藥檔載入中...)</span></h3>
    
    <div class="flex-row">
      <div style="flex: 1.5;">
        <label>代碼</label>
        <input type="text" id="input-code" placeholder="輸入或刷條碼" oninput="searchDrug()" onkeypress="handleEnter(event, 'input-qty')">
      </div>
      <div style="flex: 2;">
        <label>名稱 (自動帶出)</label>
        <input type="text" id="input-name" placeholder="系統自動帶出" disabled>
      </div>
      <div style="flex: 1;">
        <label>數量</label>
        <input type="number" id="input-qty" placeholder="數量" onkeypress="handleEnter(event, 'btn-add')">
      </div>
    </div>
    <button id="btn-add" class="btn-add" onclick="addItem()">⬇️ 加入下方清單</button>
  </div>

  <div class="card" id="list-section" style="display: none;">
    <h3 style="margin-top: 0; color: #2c3e50; font-size: 16px;">📋 待上傳清單 <span class="total-badge" id="item-count">共 0 筆</span></h3>
    <div style="overflow-x: auto;">
      <table id="item-table">
        <thead>
          <tr>
            <th>代碼</th>
            <th>名稱</th>
            <th>數量</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="item-tbody">
          </tbody>
      </table>
    </div>
    <button id="btn-submit" class="btn-submit" onclick="submitInventory()">✅ 確認送出大盤點資料</button>
  </div>

  <script>
    // ⚠️ 貼上您的 GAS 部署網址 (務必是 /exec 結尾)
    const GAS_URL = "您的GAS部署網址";

    let drugDict = {}; 
    let scanList = []; 

    window.onload = function() {
      // 嘗試讀取上次輸入的盤點人和區域，節省打字時間
      document.getElementById('input-desk').value = localStorage.getItem("invDesk") || "";
      document.getElementById('input-loc').value = localStorage.getItem("invLoc") || "";
      
      fetchDrugs();
    };

    // 破解快取
    function getNoCacheUrl(baseAction) {
      return GAS_URL + "?action=" + baseAction + "&t=" + new Date().getTime();
    }

    // 取得藥品主檔，用於輸入代碼時自動帶出名稱
    async function fetchDrugs() {
      const statusSpan = document.getElementById('db-status');
      try {
        const res = await fetch(getNoCacheUrl("getDrugs"));
        const drugs = await res.json();
        drugs.forEach(d => {
          drugDict[String(d["藥品代碼"]).trim().toUpperCase()] = d["藥品名稱"];
        });
        statusSpan.innerText = "(✅ 藥檔已載入)";
        statusSpan.style.color = "#27ae60";
      } catch (e) {
        statusSpan.innerText = "(❌ 藥檔載入失敗)";
        statusSpan.style.color = "#e74c3c";
      }
    }

    // 當輸入代碼時，即時查找藥名
    function searchDrug() {
      const codeInput = document.getElementById('input-code');
      const nameInput = document.getElementById('input-name');
      const cleanCode = codeInput.value.trim().toUpperCase();
      
      if (cleanCode && drugDict[cleanCode]) {
        nameInput.value = drugDict[cleanCode];
      } else {
        nameInput.value = "";
      }
    }

    // 支援按下 Enter 鍵自動跳到下一個欄位或加入清單 (適合條碼機)
    function handleEnter(e, nextElementId) {
      if (e.key === 'Enter') {
        e.preventDefault();
        if(nextElementId === 'btn-add') {
          addItem();
        } else {
          document.getElementById(nextElementId).focus();
        }
      }
    }

    // 將輸入的藥品加入下方暫存清單
    function addItem() {
      const code = document.getElementById('input-code').value.trim().toUpperCase();
      let name = document.getElementById('input-name').value.trim();
      const qty = document.getElementById('input-qty').value.trim();

      if (!code) { alert("⚠️ 請輸入藥品代碼！"); return; }
      if (!qty) { alert("⚠️ 請輸入實盤數量！"); return; }
      if (!name) name = "未知藥品(未建檔)"; 

      scanList.push({ drugCode: code, drugName: name, qty: qty });
      
      // 清空輸入框，游標自動回到代碼框，方便連續輸入
      document.getElementById('input-code').value = "";
      document.getElementById('input-name').value = "";
      document.getElementById('input-qty').value = "";
      document.getElementById('input-code').focus();

      renderTable();
    }

    // 移除清單中的某個項目
    function removeItem(index) {
      scanList.splice(index, 1);
      renderTable();
    }

    // 渲染待上傳表格
    function renderTable() {
      const section = document.getElementById('list-section');
      const tbody = document.getElementById('item-tbody');
      const count = document.getElementById('item-count');

      if (scanList.length === 0) {
        section.style.display = "none";
        return;
      }

      section.style.display = "block";
      count.innerText = `共 ${scanList.length} 筆`;
      tbody.innerHTML = "";

      // 將最新的顯示在最上面
      [...scanList].reverse().forEach((item, revIndex) => {
        const trueIndex = scanList.length - 1 - revIndex;
        tbody.innerHTML += `
          <tr>
            <td><strong>${item.drugCode}</strong></td>
            <td>${item.drugName}</td>
            <td style="color:#27ae60; font-weight:bold; font-size:16px;">${item.qty}</td>
            <td><button class="btn-remove" onclick="removeItem(${trueIndex})">刪除</button></td>
          </tr>
        `;
      });
    }

    // 送出大盤點資料給 GAS
    async function submitInventory() {
      const desk = document.getElementById('input-desk').value.trim();
      const loc = document.getElementById('input-loc').value.trim();
      const note = document.getElementById('input-note').value.trim();

      if (!desk) { alert("⚠️ 請輸入「工作檯 / 盤點人」！"); return; }
      if (!loc) { alert("⚠️ 請輸入「盤點區域」！"); return; }
      if (scanList.length === 0) { alert("⚠️ 清單中沒有任何藥品！"); return; }

      // 記住這次的設定，下次打開就不用重打
      localStorage.setItem("invDesk", desk);
      localStorage.setItem("invLoc", loc);

      const btn = document.getElementById('btn-submit');
      btn.innerText = "⏳ 資料上傳中，請稍候...";
      btn.disabled = true;

      try {
        const payload = {
          action: "submitFullCheck",
          desk: desk,
          location: loc,
          note: note,
          mode: "full",
          items: scanList
        };

        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const result = await res.json();

        if (result.status === "success") {
          alert(`✅ 成功上傳 ${scanList.length} 筆盤點資料！`);
          scanList = []; // 清空清單
          renderTable();
        } else {
          alert("❌ 系統回傳錯誤：" + result.message);
        }
      } catch (e) {
        alert("❌ 上傳失敗，請檢查網路連線！");
      }

      btn.innerText = "✅ 確認送出大盤點資料";
      btn.disabled = false;
    }
  </script>
</body>
</html>
