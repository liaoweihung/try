<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主管派案 - 藥局抽盤系統</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; color: #333; }
    h2 { text-align: center; color: #2c3e50; margin-top: 5px; }
    .card { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #2980b9; }
    select, input[type="date"], input[type="text"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .btn-success { background-color: #27ae60; color: white; }
    .btn-outline { background-color: #fff; color: #3498db; border: 1px solid #3498db; padding: 5px 10px; border-radius: 4px; font-size: 14px;}
    .btn:disabled { background-color: #95a5a6; cursor: not-allowed; }
    
    .drug-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    .drug-row input[type="checkbox"] { transform: scale(1.3); margin-right: 15px; }
    .drug-name { font-size: 16px; font-weight: bold; color: #2c3e50; }
    .drug-code { font-size: 13px; color: #7f8c8d; }
    .cabinet-badge { background-color: #e8f4fd; color: #2980b9; padding: 2px 6px; border-radius: 10px; font-size: 12px; margin-left: 5px; }
    .flex-row { display: flex; gap: 10px; }
    .flex-row > div { flex: 1; }
  </style>
</head>
<body>
  <h2>📋 任務派發中心</h2>

  <div class="card" id="setup-section">
    <label>📅 1. 設定盤點日期：</label>
    <input type="date" id="task-date">

    <label>📍 2. 選擇篩選階層 (由大到小)：</label>
    <div class="flex-row">
      <div>
        <select id="main-area" onchange="updateSubArea()">
          <option value="">⏳ 載入資料庫中...</option>
        </select>
      </div>
      <div>
        <select id="sub-area" onchange="updateCabinet()" disabled>
          <option value="">-- 小區 --</option>
        </select>
      </div>
    </div>
    <select id="cabinet" onchange="renderDrugs()" disabled>
      <option value="">-- 櫃位 (可不選) --</option>
    </select>
  </div>

  <div id="drug-container" class="card" style="display:none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <label style="margin: 0;">🔎 3. 勾選藥品發佈：</label>
      <div>
        <button class="btn-outline" onclick="toggleAll(true)">全選</button>
        <button class="btn-outline" style="border-color:#e74c3c; color:#e74c3c;" onclick="toggleAll(false)">清空</button>
      </div>
    </div>
    <input type="text" id="search-box" placeholder="輸入藥名或代碼過濾..." oninput="filterDrugs()">
    
    <div id="drug-list" style="max-height: 350px; overflow-y: auto; border: 1px solid #eee; border-radius: 5px; margin-bottom: 15px;"></div>
    
    <button class="btn btn-success" id="publish-btn" onclick="publishTasks()">🚀 發佈勾選項目至任務</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec";
    let db = {}; // 存放階層資料
    let currentDrugs = []; // 目前篩選出的藥品清單

    window.onload = async function() {
      const today = new Date();
      document.getElementById('task-date').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      
      try {
        const res = await fetch(GAS_URL + "?action=getDrugs");
        const rawData = await res.json();
        
        // 建立階層結構 db[大區][小區][櫃位] = [藥品陣列]
        rawData.forEach(row => {
          const mainArea = String(row["大區1"] || "未分類").trim();
          const subArea = String(row["小區1"] || "未分類").trim();
          const cabinet = String(row["櫃位"] || "未分類").trim();
          
          if (!db[mainArea]) db[mainArea] = {};
          if (!db[mainArea][subArea]) db[mainArea][subArea] = {};
          if (!db[mainArea][subArea][cabinet]) db[mainArea][subArea][cabinet] = [];
          
          db[mainArea][subArea][cabinet].push({ code: row["藥品代碼"], name: row["中文商品名"] || row["英文商品名"], cabinet: cabinet });
        });

        const mainSelect = document.getElementById("main-area");
        mainSelect.innerHTML = '<option value="">-- 大區 --</option>';
        Object.keys(db).sort().forEach(m => mainSelect.innerHTML += `<option value="${m}">${m}</option>`);
        
        document.getElementById('drug-container').style.display = 'block';
        document.getElementById('drug-list').innerHTML = "<div style='padding:15px; text-align:center; color:#999;'>請先從上方選擇區域</div>";
      } catch (e) {
        alert("資料庫載入失敗，請重整網頁");
      }
    };

    function updateSubArea() {
      const main = document.getElementById("main-area").value;
      const subSelect = document.getElementById("sub-area");
      const cabSelect = document.getElementById("cabinet");
      
      subSelect.innerHTML = '<option value="">-- 小區 (可不選) --</option>';
      cabSelect.innerHTML = '<option value="">-- 櫃位 (可不選) --</option>';
      
      if (main && db[main]) {
        subSelect.disabled = false;
        Object.keys(db[main]).sort().forEach(s => subSelect.innerHTML += `<option value="${s}">${s}</option>`);
      } else {
        subSelect.disabled = true; cabSelect.disabled = true;
      }
      renderDrugs();
    }

    function updateCabinet() {
      const main = document.getElementById("main-area").value;
      const sub = document.getElementById("sub-area").value;
      const cabSelect = document.getElementById("cabinet");
      
      cabSelect.innerHTML = '<option value="">-- 櫃位 (可不選) --</option>';
      if (main && sub && db[main][sub]) {
        cabSelect.disabled = false;
        Object.keys(db[main][sub]).sort().forEach(c => cabSelect.innerHTML += `<option value="${c}">${c}</option>`);
      } else {
        cabSelect.disabled = true;
      }
      renderDrugs();
    }

    function renderDrugs() {
      const main = document.getElementById("main-area").value;
      const sub = document.getElementById("sub-area").value;
      const cab = document.getElementById("cabinet").value;
      const listDiv = document.getElementById("drug-list");
      
      if (!main) { listDiv.innerHTML = "<div style='padding:15px; text-align:center; color:#999;'>請先從上方選擇區域</div>"; return; }
      
      currentDrugs = [];
      // 依據選擇的精確度往下挖掘資料
      Object.keys(db[main]).forEach(s => {
        if (!sub || s === sub) {
          Object.keys(db[main][s]).forEach(c => {
            if (!cab || c === cab) {
              currentDrugs = currentDrugs.concat(db[main][s][c]);
            }
          });
        }
      });

      // 畫面渲染
      listDiv.innerHTML = "";
      document.getElementById('search-box').value = "";
      if (currentDrugs.length === 0) {
        listDiv.innerHTML = "<div style='padding:15px; text-align:center; color:#999;'>此條件下無藥品</div>";
      } else {
        currentDrugs.forEach(drug => {
          listDiv.innerHTML += `
            <label class="drug-row">
              <input type="checkbox" class="drug-checkbox" value="${drug.code}" data-name="${drug.name}">
              <div>
                <div class="drug-name">${drug.name} <span class="cabinet-badge">${drug.cabinet}</span></div>
                <div class="drug-code">代碼：${drug.code}</div>
              </div>
            </label>`;
        });
      }
    }

    function filterDrugs() {
      const kw = document.getElementById('search-box').value.toLowerCase();
      document.querySelectorAll('.drug-row').forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(kw) ? "flex" : "none";
      });
    }

    function toggleAll(check) {
      document.querySelectorAll('.drug-row').forEach(row => {
        if (row.style.display !== "none") row.querySelector('.drug-checkbox').checked = check;
      });
    }

    async function publishTasks() {
      const date = document.getElementById('task-date').value;
      const main = document.getElementById("main-area").value;
      const sub = document.getElementById("sub-area").value;
      const cbs = document.querySelectorAll('.drug-checkbox:checked');
      
      if (!date || !main) { alert("請設定日期並選擇大區！"); return; }
      if (cbs.length === 0) { alert("請勾選藥品！"); return; }

      const selected = Array.from(cbs).map(cb => ({ code: cb.value, name: cb.getAttribute('data-name') }));
      const locString = sub ? `${main}-${sub}` : main; // 紀錄發佈位置供報表顯示

      const btn = document.getElementById('publish-btn');
      btn.innerText = "傳送中..."; btn.disabled = true;

      try {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "setTasks", date: date, location: locString, drugs: selected }) });
        const result = await res.json();
        if (result.status === "success") {
          alert(`✅ 成功發佈 ${selected.length} 項任務！`);
          toggleAll(false);
        }
      } catch (e) { alert("❌ 傳送失敗，請檢查網路"); }
      btn.innerText = "🚀 發佈勾選項目至任務"; btn.disabled = false;
    }
  </script>
</body>
</html>
