<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主管派案 - 抽盤系統</title>
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f8fafc; padding: 20px; color: #334155; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
    
    label { font-weight: bold; color: #3b82f6; display: block; margin-bottom: 8px; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; }
    
    /* 搜尋結果清單 */
    .search-result-box { border: 1px solid #e2e8f0; border-radius: 10px; max-height: 300px; overflow-y: auto; background: #fff; }
    .drug-row { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .drug-row:hover { background: #f0f9ff; }
    .drug-info { line-height: 1.4; }
    .drug-name { font-weight: bold; font-size: 16px; color: #1e293b; }
    .drug-meta { font-size: 13px; color: #64748b; }
    .btn-add { background: #3b82f6; color: white; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    
    /* 待派案購物車 */
    .cart-section { background: #eff6ff; border: 2px solid #dbeafe; padding: 15px; border-radius: 12px; }
    .cart-item { display: inline-flex; align-items: center; background: #3b82f6; color: white; padding: 5px 12px; border-radius: 20px; margin: 5px; font-size: 14px; }
    .cart-item span { margin-left: 8px; cursor: pointer; background: rgba(0,0,0,0.2); border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }

    .btn-publish { background: #22c55e; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3); }
    .btn-publish:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

    .footer-note { margin-top: 40px; padding: 20px; background: #f1f5f9; border-radius: 10px; border-top: 4px solid #94a3b8; font-size: 14px; color: #475569; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2 style="margin-top:0; color:#1e293b; text-align:center;">🎯 抽盤任務指派</h2>
    
    <label>📅 任務執行日期</label>
    <input type="date" id="task-date">

    <label>🔍 搜尋藥品 (支援代碼、名稱、大區模糊比對)</label>
    <input type="text" id="search-input" placeholder="請輸入部分文字..." oninput="filterDrugs()">

    <label>大區過濾</label>
    <select id="area-filter" onchange="filterDrugs()">
      <option value="">-- 全部大區 --</option>
    </select>

    <div class="search-result-box" id="result-list">
      <p style="text-align:center; padding:20px; color:#94a3b8;">載入主檔資料中，請稍候...</p>
    </div>
  </div>

  <div class="card cart-section">
    <label>🛒 待派案清單 (<span id="count">0</span> 項)</label>
    <div id="cart-content"></div>
    <button class="btn-publish" id="publish-btn" onclick="submitTasks()" disabled>發布抽盤任務</button>
  </div>

  <div class="footer-note">
    <strong>📋 派案操作說明：</strong><br><br>
    1. <b>搜尋：</b> 輸入部分藥名或院內碼，系統會即時篩選。若有同成分不同規格，請從清單中點選正確品項。<br>
    2. <b>完全一致：</b> 若搜尋文字與代碼完全相同，該品項會排在清單第一位。<br>
    3. <b>加入：</b> 點擊「+ 指派」可將藥品放入下方清單。可同時跨區挑選多項藥品一次發布。<br>
    4. <b>發布：</b> 設定好執行日期後按「發布」，任務將會同步到同仁的手機端。
  </div>
</div>

<script>
  // 🚨 請替換成您的 GAS 網址
  const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec"; 
  let allDrugs = [];
  let cart = new Map();

  window.onload = async function() {
    document.getElementById('task-date').valueAsDate = new Date();
    try {
      const res = await fetch(GAS_URL + "?action=getDrugs");
      const data = await res.json();
      
      // 🎯 已精準校正：代碼[0], 名稱[1], 儲位[4], 大區[6]
      allDrugs = data.map(row => ({
        code: String(row[0] || "").trim(),
        name: String(row[1] || "").trim(),
        loc: String(row[4] || "未設儲位").trim(), 
        area: String(row[6] || "").trim() 
      })).filter(d => d.code && d.area && d.area !== "undefined"); 

      const areas = [...new Set(allDrugs.map(d => d.area))].sort();
      const select = document.getElementById('area-filter');
      areas.forEach(a => {
        select.innerHTML += `<option value="${a}">${a}</option>`;
      });

      filterDrugs();
    } catch(e) {
      document.getElementById('result-list').innerHTML = `<p style="text-align:center; color:red;">載入失敗，請檢查網路</p>`;
    }
  };

  function filterDrugs() {
    const query = document.getElementById('search-input').value.trim().toUpperCase();
    const area = document.getElementById('area-filter').value;
    const listDiv = document.getElementById('result-list');
    
    let filtered = allDrugs.filter(d => {
      const matchText = d.code.toUpperCase().includes(query) || d.name.toUpperCase().includes(query);
      const matchArea = area === "" || d.area === area;
      return matchText && matchArea;
    });

    filtered.sort((a, b) => {
      if (a.code.toUpperCase() === query) return -1;
      if (b.code.toUpperCase() === query) return 1;
      return 0;
    });

    if (filtered.length === 0) {
      listDiv.innerHTML = `<p style="text-align:center; padding:20px; color:#94a3b8;">找不到匹配的藥品</p>`;
      return;
    }

    listDiv.innerHTML = filtered.slice(0, 30).map(d => `
      <div class="drug-row">
        <div class="drug-info">
          <div class="drug-name">${d.name}</div>
          <div class="drug-meta">${d.code} | ${d.area} | 儲位: ${d.loc}</div>
        </div>
        <button class="btn-add" onclick="addToCart('${d.code}', '${d.name}', '${d.area}-${d.loc}')">+ 指派</button>
      </div>
    `).join('');
  }

  function addToCart(code, name, loc) {
    const uniqueKey = code + "|" + loc;
    cart.set(uniqueKey, { code, name, loc });
    renderCart();
  }

  function removeFromCart(uniqueKey) {
    cart.delete(uniqueKey);
    renderCart();
  }

  function renderCart() {
    const container = document.getElementById('cart-content');
    const count = document.getElementById('count');
    const btn = document.getElementById('publish-btn');
    
    container.innerHTML = "";
    cart.forEach((val, key) => {
      container.innerHTML += `
        <div class="cart-item">
          ${val.name} (${val.loc}) <span onclick="removeFromCart('${key}')">✕</span>
        </div>`;
    });

    count.innerText = cart.size;
    btn.disabled = cart.size === 0;
  }

  async function submitTasks() {
    const date = document.getElementById('task-date').value;
    const drugs = [];
    cart.forEach((val) => drugs.push({ code: val.code, name: val.name, loc: val.loc }));

    const btn = document.getElementById('publish-btn');
    btn.innerText = "傳送中...";
    btn.disabled = true;

    try {
      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ action: "setTasks", date: date, drugs: drugs })
      });
      const result = await res.json();
      if (result.status === "success") {
        alert("✅ 抽盤任務已成功發佈！");
        cart.clear();
        renderCart();
      }
    } catch(e) {
      alert("❌ 發佈失敗，請確認網路連線。");
    } finally {
      btn.innerText = "發佈抽盤任務";
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
