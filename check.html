<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>同仁抽盤 - 藥局抽盤系統</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: #f0f2f5; color: #333; margin: 0; }
    h2 { text-align: center; color: #2c3e50; margin-top: 5px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    input, select { width: 100%; padding: 12px; margin: 8px 0 15px 0; box-sizing: border-box; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; }
    label { font-weight: bold; color: #2980b9; font-size: 15px; }
    
    .btn-submit { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); cursor: pointer; }
    .btn-submit:disabled { background: #95a5a6; box-shadow: none; cursor: not-allowed; }
    
    .task-card { border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #fff; border-left: 5px solid #3498db; }
    .drug-title { font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
    .drug-meta { font-size: 14px; color: #64748b; margin-bottom: 10px; display: flex; justify-content: space-between; }
    .loc-badge { background: #e0f2fe; color: #0284c7; padding: 3px 8px; border-radius: 6px; font-weight: bold; }
    
    .flex-row { display: flex; gap: 10px; }
    .flex-row > div { flex: 1; }
    
    .recent-item { padding: 10px 0; border-bottom: 1px dashed #cbd5e1; font-size: 14px; }
    .recent-item:last-child { border-bottom: none; }
    .highlight-qty { color: #e74c3c; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>

  <h2>🔎 現場抽盤作業</h2>

  <div class="card">
    <div class="flex-row">
      <div>
        <label>👤 盤點人員 (必填)</label>
        <input type="text" id="staff-name" placeholder="姓名或代號">
      </div>
      <div>
        <label>📅 任務日期</label>
        <select id="task-date" onchange="loadTasks()">
          <option value="" disabled selected>⏳ 讀取中...</option>
        </select>
      </div>
    </div>
  </div>

  <div id="tasks-container" style="display: none;">
    <h3 style="color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px;">📍 待盤點清單</h3>
    <div id="task-list"></div>
    <button class="btn-submit" id="submit-btn" onclick="submitAudit()">✅ 確認上傳結果</button>
  </div>

  <div class="card" style="margin-top: 30px;">
    <h3 style="margin-top: 0; color: #7f8c8d;">🕒 雲端最新上傳紀錄</h3>
    <div id="recent-list" style="color: #64748b; font-size: 14px;">載入中...</div>
  </div>

  <script>
    // 🚨 請替換成您的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec"; 
    let currentTasks = [];

    window.onload = async function() {
      const savedName = localStorage.getItem("savedStaffName");
      if (savedName) document.getElementById('staff-name').value = savedName;
      await fetchAvailableDates();
      await loadRecentRecords();
    };

    function getNoCacheUrl(baseAction) {
      return GAS_URL + "?action=" + baseAction + "&t=" + new Date().getTime();
    }

    // 取得有任務的日期
    async function fetchAvailableDates() {
      const select = document.getElementById('task-date');
      try {
        const res = await fetch(getNoCacheUrl("getAuditDates"));
        const dates = await res.json();
        
        select.innerHTML = '<option value="" disabled selected>-- 請選擇任務日期 --</option>';
        if (dates.length === 0) {
          select.innerHTML = '<option value="" disabled selected>🎉 目前無待盤點任務</option>';
        } else {
          dates.forEach(d => {
            select.innerHTML += `<option value="${d}">${d}</option>`;
          });
        }
      } catch (e) {
        select.innerHTML = '<option value="" disabled selected>❌ 載入失敗，請檢查網路</option>';
      }
    }

    // 載入該日期的任務
    async function loadTasks() {
      const date = document.getElementById('task-date').value;
      const container = document.getElementById('tasks-container');
      const list = document.getElementById('task-list');
      
      list.innerHTML = "<p style='text-align:center;'>正在撈取任務，請稍候...</p>";
      container.style.display = "block";

      try {
        const res = await fetch(getNoCacheUrl("getAuditTasks") + "&date=" + date);
        currentTasks = await res.json();

        if (currentTasks.length === 0) {
          list.innerHTML = "<p style='color: green; text-align:center;'>此日期任務已全數完成！</p>";
          document.getElementById('submit-btn').style.display = 'none';
          return;
        }

        document.getElementById('submit-btn').style.display = 'block';
        list.innerHTML = "";
        
        currentTasks.forEach((task, index) => {
          list.innerHTML += `
            <div class="task-card" data-index="${index}">
              <div class="drug-title">${task.name}</div>
              <div class="drug-meta">
                <span>代碼: ${task.code}</span>
                <span class="loc-badge">${task.loc}</span>
              </div>
              <div class="flex-row">
                <div>
                  <label>實盤數量：</label>
                  <input type="number" id="qty-${index}" placeholder="數量" inputmode="numeric">
                </div>
                <div>
                  <label>最舊效期：</label>
                  <input type="date" id="expiry-${index}">
                </div>
              </div>
            </div>
          `;
        });
      } catch (e) {
        list.innerHTML = "<p style='color: red;'>載入失敗，請重試。</p>";
      }
    }

    // 送出盤點結果
    async function submitAudit() {
      const staffName = document.getElementById('staff-name').value.trim();
      const taskDate = document.getElementById('task-date').value;
      
      if (!staffName) return alert("⚠️ 請先輸入盤點人員姓名！");
      localStorage.setItem("savedStaffName", staffName);

      const itemsToSubmit = [];
      let hasError = false;

      currentTasks.forEach((task, index) => {
        const qtyVal = document.getElementById(`qty-${index}`).value;
        const expiryVal = document.getElementById(`expiry-${index}`).value;

        // 如果數量和效期都沒填，代表跳過此項不盤點
        if (qtyVal === "" && !expiryVal) return; 

        // 防呆：有填數量就必須填效期，反之亦然
        if (qtyVal === "") {
          alert(`⚠️ 您選擇了「${task.name}」的效期，但忘記填寫實盤數量！`);
          hasError = true;
        } else if (!expiryVal) {
          alert(`⚠️ 您填寫了「${task.name}」的數量，但忘記選擇最舊效期！`);
          hasError = true;
        }

        if (qtyVal !== "" && expiryVal) {
          itemsToSubmit.push({
            rowIdx: task.rowIdx,
            code: task.code,
            name: task.name,
            loc: task.loc,
            qty: qtyVal,
            expiry: expiryVal
          });
        }
      });

      if (hasError) return;
      if (itemsToSubmit.length === 0) return alert("⚠️ 您尚未輸入任何盤點資料喔！");
      
      if (itemsToSubmit.length < currentTasks.length) {
        if (!confirm("⚠️ 有部分藥品未填寫，這些項目將保留為「待盤點」。確定要送出嗎？")) return;
      }

      const btn = document.getElementById('submit-btn');
      btn.innerText = "資料上傳中... ⏳"; 
      btn.disabled = true;

      try {
        const payload = { action: "submitRandomCheck", date: taskDate, user: staffName, items: itemsToSubmit };
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();
        
        if(result.status === "success") {
          alert(`✅ 成功上傳 ${itemsToSubmit.length} 筆盤點任務！`);
          document.getElementById('task-date').value = ""; 
          document.getElementById('tasks-container').style.display = "none";
          await fetchAvailableDates(); 
          await loadRecentRecords();
        }
      } catch(e) { 
        alert("❌ 上傳失敗，請檢查網路連線！"); 
      } finally {
        btn.innerText = "✅ 確認上傳結果"; 
        btn.disabled = false;
      }
    }
   
    
// 取得最近紀錄 (修復 Invalid Date 問題)
    async function loadRecentRecords() {
      const div = document.getElementById('recent-list');
      try {
        const res = await fetch(getNoCacheUrl("getRecentRecords"));
        const records = await res.json();
        
        if (records.length === 0) {
          div.innerHTML = "尚無抽盤紀錄"; return;
        }

        div.innerHTML = records.map(r => `
          <div class="recent-item">
            <span style="color:#3b82f6; font-weight:bold;">${r.user}</span> 盤點了 
            <strong>${r.name}</strong> (${r.loc}) ➔ <span class="highlight-qty">${r.qty}</span>
            <div style="font-size:12px; color:#94a3b8; margin-top:3px;">
              任務日: ${r.date} | 紀錄時間: ${r.time}
            </div>
          </div>
        `).join('');
      } catch (e) {
        div.innerHTML = "無法載入最近紀錄";
      }
    }
  </script>
</body>
</html>
