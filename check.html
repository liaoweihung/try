<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同仁抽盤 - 藥局抽盤系統</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: #f0f2f5; color: #333; margin: 0; }
    h2 { text-align: center; color: #2c3e50; margin-top: 5px; }
    .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
    input, select { width: 100%; padding: 10px; margin: 5px 0 10px 0; box-sizing: border-box; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
    label { font-weight: bold; color: #2980b9; font-size: 14px; }
    button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; margin-bottom: 20px;}
    
    .task-card { border-left: 5px solid #3498db; }
    .drug-name { font-weight: bold; color: #2c3e50; font-size: 18px; }
    .cabinet-badge { background-color: #e8f4fd; color: #2980b9; padding: 2px 6px; border-radius: 10px; font-size: 12px; margin-left: 5px; }
    .flex-row { display: flex; gap: 10px; }
    .flex-row > div { flex: 1; }
    .history-item { border-bottom: 1px dashed #eee; padding: 8px 0; font-size: 13px; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h2>🔎 現場抽盤作業</h2>
  
  <div class="card">
    <div class="flex-row">
      <div>
        <label>👤 盤點人：</label>
        <input type="text" id="staff-name" placeholder="姓名">
      </div>
      <div>
        <label>📅 任務日期：</label>
        <select id="task-date" onchange="fetchTasks()">
          <option value="">⏳ 載入任務日期中...</option>
        </select>
      </div>
    </div>

    <label style="margin-top:10px;">📍 選擇任務區域 (由大到小)：</label>
    <div class="flex-row">
      <div><select id="main-area" onchange="updateSubArea()" disabled><option value="">-- 先選日期 --</option></select></div>
      <div><select id="sub-area" onchange="updateCabinet()" disabled><option value="">-- 小區 --</option></select></div>
    </div>
    <select id="cabinet" onchange="renderTasks()" disabled><option value="">-- 櫃位 (可不選) --</option></select>
  </div>

  <div id="task-list"></div>
  <button id="submit-btn" style="display:none;" onclick="submitData()">✅ 確認上傳結果</button>

  <div class="card" id="recent-section">
    <h3 style="margin-top: 0; font-size: 15px; color:#7f8c8d;">🕒 雲端最新上傳紀錄</h3>
    <div id="recent-list" style="color:#999;">載入中...</div>
  </div>

  <script>
    // ⚠️ 請在這裡替換成您最新的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec";
    
    let taskDB = {}; 

    window.onload = async function() {
      const savedName = localStorage.getItem("savedStaffName");
      if (savedName) document.getElementById('staff-name').value = savedName;
      
      await fetchAvailableDates();
      loadRecentRecords();
    };

    // 💡 取得時間戳記當作「快取破壞者」
    function getNoCacheUrl(baseAction) {
      return GAS_URL + "?action=" + baseAction + "&t=" + new Date().getTime();
    }

    async function fetchAvailableDates() {
      const dateSelect = document.getElementById('task-date');
      try {
        const res = await fetch(getNoCacheUrl("getAvailableDates"));
        const dates = await res.json();
        
        if (dates.length === 0) {
          dateSelect.innerHTML = '<option value="">🎉 目前全區無待辦任務</option>';
          return;
        }

        dateSelect.innerHTML = '<option value="">-- 請選擇任務日期 --</option>';
        dates.forEach(d => dateSelect.innerHTML += `<option value="${d}">${d}</option>`);
      } catch (e) { dateSelect.innerHTML = '<option value="">❌ 載入日期失敗</option>'; }
    }

    async function fetchTasks() {
      const date = document.getElementById('task-date').value;
      const mainSelect = document.getElementById('main-area');
      
      if(!date) { mainSelect.innerHTML = '<option value="">-- 先選日期 --</option>'; mainSelect.disabled = true; return; }

      mainSelect.innerHTML = '<option value="">⏳ 抓取任務中...</option>';
      mainSelect.disabled = false;
      document.getElementById('task-list').innerHTML = "";
      document.getElementById('submit-btn').style.display = "none";
      taskDB = {};

      try {
        // 💡 每次抓任務都強迫瀏覽器抓最新的！
        const res = await fetch(getNoCacheUrl("getTasksByDate") + "&date=" + date);
        const allTasks = await res.json();
        
        if (allTasks.length === 0) {
          mainSelect.innerHTML = '<option value="">本區當日無任務</option>';
          return;
        }

        allTasks.forEach(task => {
          if (!taskDB[task.mainArea]) taskDB[task.mainArea] = {};
          if (!taskDB[task.mainArea][task.subArea]) taskDB[task.mainArea][task.subArea] = {};
          if (!taskDB[task.mainArea][task.subArea][task.cabinet]) taskDB[task.mainArea][task.subArea][task.cabinet] = [];
          taskDB[task.mainArea][task.subArea][task.cabinet].push(task);
        });

        mainSelect.innerHTML = '<option value="">-- 請選擇大區 --</option>';
        Object.keys(taskDB).sort().forEach(m => mainSelect.innerHTML += `<option value="${m}">${m}</option>`);
        
      } catch (e) { mainSelect.innerHTML = '<option value="">❌ 載入失敗</option>'; }
    }

    function updateSubArea() {
      const main = document.getElementById("main-area").value;
      const subSelect = document.getElementById("sub-area");
      const cabSelect = document.getElementById("cabinet");
      
      subSelect.innerHTML = '<option value="">-- 小區 (可不選) --</option>';
      cabSelect.innerHTML = '<option value="">-- 櫃位 (可不選) --</option>';
      
      if (main && taskDB[main]) {
        subSelect.disabled = false;
        Object.keys(taskDB[main]).sort().forEach(s => subSelect.innerHTML += `<option value="${s}">${s}</option>`);
      } else { subSelect.disabled = true; cabSelect.disabled = true; }
      renderTasks();
    }

    function updateCabinet() {
      const main = document.getElementById("main-area").value;
      const sub = document.getElementById("sub-area").value;
      const cabSelect = document.getElementById("cabinet");
      
      cabSelect.innerHTML = '<option value="">-- 櫃位 (可不選) --</option>';
      if (main && sub && taskDB[main][sub]) {
        cabSelect.disabled = false;
        Object.keys(taskDB[main][sub]).sort().forEach(c => cabSelect.innerHTML += `<option value="${c}">${c}</option>`);
      } else { cabSelect.disabled = true; }
      renderTasks();
    }

    function renderTasks() {
      const main = document.getElementById("main-area").value;
      const sub = document.getElementById("sub-area").value;
      const cab = document.getElementById("cabinet").value;
      const listDiv = document.getElementById("task-list");
      
      if (!main) { listDiv.innerHTML = ""; document.getElementById('submit-btn').style.display = "none"; return; }
      
      let displayTasks = [];
      Object.keys(taskDB[main]).forEach(s => {
        if (!sub || s === sub) {
          Object.keys(taskDB[main][s]).forEach(c => {
            if (!cab || c === cab) displayTasks = displayTasks.concat(taskDB[main][s][c]);
          });
        }
      });

      listDiv.innerHTML = "";
      if (displayTasks.length === 0) {
        listDiv.innerHTML = "<div style='text-align:center; padding:15px; color:#999;'>此階層無任務</div>";
        document.getElementById('submit-btn').style.display = "none";
      } else {
        displayTasks.forEach(task => {
          listDiv.innerHTML += `
            <div class="card task-card" data-code="${task.code}" data-name="${task.name}" data-loc="${task.loc}">
              <div class="drug-name">${task.name} <span class="cabinet-badge">${task.cabinet}</span></div>
              <div style="color:#7f8c8d; font-size:12px; margin-bottom:8px;">代碼：${task.code}</div>
              <div class="flex-row">
                <div><label>實盤數量：</label><input type="number" class="qty" placeholder="數量" inputmode="numeric"></div>
                <div><label>最舊效期：</label><input type="date" class="expiry"></div>
              </div>
            </div>`;
        });
        document.getElementById('submit-btn').style.display = "block";
      }
    }

    async function submitData() {
      const staffName = document.getElementById('staff-name').value.trim();
      if (!staffName) { alert("請輸入盤點人姓名！"); return; }
      localStorage.setItem("savedStaffName", staffName);

      const items = [];
      document.querySelectorAll('.task-card').forEach(c => {
        items.push({
          code: c.dataset.code, 
          name: c.dataset.name,
          loc: c.dataset.loc,
          qty: c.querySelector('.qty').value || 0,
          expiry: c.querySelector('.expiry').value
        });
      });

      const btn = document.getElementById('submit-btn');
      btn.innerText = "上傳中..."; btn.disabled = true;

      try {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({
          action: "submitRandomCheck", date: document.getElementById('task-date').value,
          user: staffName, items: items
        })});
        const result = await res.json();
        if(result.status === "success") {
          alert("✅ 任務已成功上傳！");
          document.getElementById('task-date').value = ""; 
          await fetchAvailableDates(); 
          document.getElementById('task-list').innerHTML = "";
          btn.style.display = "none";
          loadRecentRecords();
        }
      } catch(e) { alert("❌ 上傳失敗，請檢查網路！"); }
      btn.innerText = "✅ 確認上傳結果"; btn.disabled = false;
    }

    async function loadRecentRecords() {
      const div = document.getElementById('recent-list');
      try {
        const res = await fetch(getNoCacheUrl("getRecentRecords"));
        const r = await res.json();
        div.innerHTML = r.length ? r.map(x => `<div class="history-item"><span>${x["時間"]}</span><span>${x["藥品名稱"]||x["藥品代碼"]} <b style="color:#e67e22;">(${x["數量"]})</b></span></div>`).join('') : "尚無紀錄";
      } catch (e) { div.innerHTML = "載入失敗"; }
    }
  </script>
</body>
</html>
