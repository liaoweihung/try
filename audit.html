<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主管審核報表 - 抽盤系統</title>
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f8fafc; padding: 20px; color: #334155; margin: 0; }
    .container { max-width: 1000px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 24px; }
    
    h2 { margin-top: 0; color: #1e293b; text-align: center; }
    label { font-weight: bold; color: #3b82f6; display: block; margin-bottom: 8px; font-size: 15px; }
    select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 16px; margin-bottom: 20px; background: #fff; }
    
    /* 進度條 */
    .progress-box { margin-bottom: 20px; }
    .progress-text { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; }
    .bar-bg { background: #e2e8f0; height: 12px; border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; background: #22c55e; transition: width 0.5s ease-out; }

    /* 表格樣式 */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
    th { background: #f8fafc; color: #64748b; font-size: 14px; white-space: nowrap; }
    tr:hover { background: #f0f9ff; }
    
    .drug-name { font-weight: bold; color: #1e293b; font-size: 16px; }
    .drug-code { font-size: 13px; color: #64748b; }
    
    /* 標籤 */
    .badge-done { background: #dcfce7; color: #166534; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: bold; border: 1px solid #bbf7d0; }
    .badge-pending { background: #fee2e2; color: #991b1b; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: bold; border: 1px solid #fecaca; }
    .loc-tag { background: #e0f2fe; color: #0284c7; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    
    .qty-text { font-size: 18px; font-weight: bold; color: #0f172a; text-align: center; display: block; }
    .expiry-text { font-size: 14px; color: #e11d48; font-weight: bold; }
    .user-info { font-size: 13px; color: #64748b; line-height: 1.4; }
    .user-info strong { color: #3b82f6; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>📊 抽盤任務審核報表</h2>
    
    <label>📅 選擇任務日期：</label>
    <select id="date-select" onchange="renderReport()">
      <option value="" disabled selected>⏳ 正在讀取資料庫...</option>
    </select>

    <div id="report-container" style="display: none;">
      <div class="progress-box">
        <div class="progress-text">
          <span>該日盤點進度</span>
          <span id="progress-numbers">0 / 0 (0%)</span>
        </div>
        <div class="bar-bg">
          <div id="progress-bar" class="bar-fill" style="width: 0%;"></div>
        </div>
      </div>

      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>狀態</th>
              <th>儲位</th>
              <th>藥品資訊</th>
              <th style="text-align: center;">實盤數量</th>
              <th>最舊效期</th>
              <th>盤點人員/時間</th>
            </tr>
          </thead>
          <tbody id="table-body">
            </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // 🚨 請替換成您的 GAS 網址
  const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec"; 
  let rawTasks = [];
  let rawRecords = [];

  window.onload = async function() {
    try {
      // 加上時間戳記避免瀏覽器快取舊資料
      const res = await fetch(GAS_URL + "?action=getAuditReport&t=" + new Date().getTime());
      const data = await res.json();
      
      rawTasks = data.tasks || [];
      rawRecords = data.records || [];

      populateDateDropdown();
    } catch(e) {
      document.getElementById('date-select').innerHTML = '<option disabled selected>❌ 資料載入失敗，請檢查網路</option>';
    }
  };

  // 1. 從任務清單中取出所有不重複的日期
  function populateDateDropdown() {
    const select = document.getElementById('date-select');
    const dates = [...new Set(rawTasks.map(t => t[0]))].sort().reverse(); // 最新日期排前面
    
    if (dates.length === 0) {
      select.innerHTML = '<option disabled selected>目前尚無任何派案紀錄</option>';
      return;
    }

    select.innerHTML = '<option value="" disabled selected>-- 請選擇要查看的任務日期 --</option>';
    dates.forEach(d => {
      select.innerHTML += `<option value="${d}">${d}</option>`;
    });
  }

  // 2. 渲染選定日期的報表
  function renderReport() {
    const selectedDate = document.getElementById('date-select').value;
    const container = document.getElementById('report-container');
    const tbody = document.getElementById('table-body');
    
    // 篩選該日期的所有任務
    const dayTasks = rawTasks.filter(t => t[0] === selectedDate);
    let completedCount = 0;
    
    tbody.innerHTML = "";

    dayTasks.forEach(task => {
      const tCode = String(task[1]).trim();
      const tName = String(task[2]).trim();
      const tLoc = String(task[3]).trim();
      const tStatus = String(task[5]).trim();
      
      // 🎯 核心比對邏輯：去「抽盤紀錄」尋找 (任務日+代碼+儲位) 完全相符的最新一筆紀錄
      const matchRecord = rawRecords.slice().reverse().find(r => 
        String(r[2]).trim() === selectedDate && 
        String(r[3]).trim() === tCode && 
        String(r[5]).trim() === tLoc
      );

      const isDone = (tStatus === "已盤點" || matchRecord);
      if (isDone) completedCount++;

      const statusBadge = isDone 
        ? `<span class="badge-done">✅ 已盤點</span>` 
        : `<span class="badge-pending">⏳ 待盤點</span>`;

      // 若有紀錄則顯示盤點數值，否則顯示橫槓
      const qty = matchRecord ? `<span class="qty-text">${matchRecord[6]}</span>` : `<span style="color:#cbd5e1; text-align:center; display:block;">-</span>`;
      const expiry = (matchRecord && matchRecord[7]) ? `<span class="expiry-text">${matchRecord[7]}</span>` : `<span style="color:#cbd5e1;">-</span>`;
      const userInfo = matchRecord 
        ? `<div class="user-info"><strong>${matchRecord[1]}</strong><br>${new Date(matchRecord[0]).toLocaleTimeString()}</div>` 
        : `<span style="color:#cbd5e1;">-</span>`;

      tbody.innerHTML += `
        <tr>
          <td>${statusBadge}</td>
          <td><span class="loc-tag">${tLoc}</span></td>
          <td>
            <div class="drug-name">${tName}</div>
            <div class="drug-code">${tCode}</div>
          </td>
          <td>${qty}</td>
          <td>${expiry}</td>
          <td>${userInfo}</td>
        </tr>
      `;
    });

    // 3. 更新進度條
    const total = dayTasks.length;
    const percent = total === 0 ? 0 : Math.round((completedCount / total) * 100);
    
    document.getElementById('progress-numbers').innerText = `${completedCount} / ${total} (${percent}%)`;
    document.getElementById('progress-bar').style.width = `${percent}%`;
    document.getElementById('progress-bar').style.background = percent === 100 ? "#22c55e" : "#3b82f6";
    
    container.style.display = "block";
  }
</script>

</body>
</html>
