<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主管審核報表 - 藥局抽盤系統</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 15px; color: #333; margin: 0; }
    h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
    .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
    label { font-weight: bold; color: #2980b9; display: block; margin-bottom: 10px; }
    select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; background: #fff; }
    
    .progress-item { margin-bottom: 15px; }
    .progress-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
    .progress-bg { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
    .progress-fill { background: #3498db; height: 100%; width: 0%; transition: width 0.6s ease; }

    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { background: #f8f9fa; padding: 12px; border: 1px solid #eee; text-align: left; font-size: 13px; color: #7f8c8d; }
    td { padding: 12px; border: 1px solid #eee; font-size: 14px; vertical-align: top; }
    .cabinet-tag { background: #e8f4fd; color: #2980b9; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    .status-done { color: #27ae60; font-weight: bold; }
    .status-wait { color: #e67e22; font-weight: bold; }
  </style>
</head>
<body>

  <h2>📊 抽盤結果審核報表</h2>

  <div class="card">
    <label>📅 請選擇審核日期 (僅顯示最近 5 筆任務)：</label>
    <select id="date-select" onchange="loadAuditData()">
      <option value="">⏳ 載入日期中...</option>
    </select>
  </div>

  <div class="card">
    <label>📈 分區完成率 (%)</label>
    <div id="progress-container">
      <div style="text-align:center; color:#999; padding:10px;">請先選擇日期</div>
    </div>
  </div>

  <div class="card table-container">
    <label>📋 盤點明細清單</label>
    <table>
      <thead>
        <tr>
          <th>位置 (大區-小區-櫃位)</th>
          <th>品名 (代碼)</th>
          <th>實盤數量</th>
          <th>最舊效期</th>
          <th>輸入時間 / 盤點人</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="result-body">
        <tr><td colspan="6" style="text-align:center; color:#999;">尚未載入資料</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    // ⚠️ 貼上您的 GAS 部署網址 (務必是 /exec 結尾)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec";

    function getNoCacheUrl(baseAction) {
      return GAS_URL + "?action=" + baseAction + "&t=" + new Date().getTime();
    }

    window.onload = function() {
      fetchDates();
    };

    async function fetchDates() {
      const select = document.getElementById('date-select');
      try {
        const res = await fetch(getNoCacheUrl("getAvailableDates"));
        const dates = await res.json();
        
        if (dates.length === 0) {
          select.innerHTML = '<option value="">目前尚無抽盤任務</option>';
          return;
        }

        select.innerHTML = ''; 
        dates.forEach((d, index) => {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d + (index === 0 ? " (最新)" : "");
          select.appendChild(opt);
        });
        
        loadAuditData(); 

      } catch (e) { select.innerHTML = '<option value="">❌ 無法抓取日期</option>'; }
    }

    async function loadAuditData() {
      const date = document.getElementById('date-select').value;
      const progressContainer = document.getElementById('progress-container');
      const tableBody = document.getElementById('result-body');
      
      if (!date) return;

      progressContainer.innerHTML = "正在計算完成率...";
      tableBody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>正在比對雲端資料庫...</td></tr>";

      try {
        const [tasks, records, drugs] = await Promise.all([
          fetch(getNoCacheUrl("getAuditTasks") + "&date=" + date).then(r => r.json()),
          fetch(getNoCacheUrl("getAuditRecords") + "&date=" + date).then(r => r.json()),
          fetch(getNoCacheUrl("getDrugs")).then(r => r.json())
        ]);

        renderProgress(tasks);
        renderTable(tasks, records, drugs);

      } catch (e) {
        progressContainer.innerHTML = "❌ 資料載入錯誤";
      }
    }

    function renderProgress(tasks) {
      const container = document.getElementById('progress-container');
      const stats = {}; 

      tasks.forEach(t => {
        const area = t[2] || "未分類";
        if (!stats[area]) stats[area] = { total: 0, done: 0 };
        stats[area].total++;
        if (String(t[3]).trim() === "已完成") stats[area].done++;
      });

      container.innerHTML = "";
      Object.keys(stats).sort().forEach(area => {
        const s = stats[area];
        const percent = Math.round((s.done / s.total) * 100);
        container.innerHTML += `
          <div class="progress-item">
            <div class="progress-info">
              <span>${area}</span>
              <span>${percent}% (${s.done}/${s.total})</span>
            </div>
            <div class="progress-bg"><div class="progress-fill" style="width:${percent}%"></div></div>
          </div>
        `;
      });
    }

    function renderTable(tasks, records, drugs) {
      const body = document.getElementById('result-body');
      const drugMap = {}; 
      drugs.forEach(d => drugMap[String(d["藥品代碼"]).trim()] = d["櫃位"] || "-");

      body.innerHTML = "";
      tasks.forEach(task => {
        const code = String(task[1]).trim();
        const area = String(task[2]).trim();
        const status = String(task[3]).trim();
        const name = task[4];
        const cabinet = drugMap[code] || "-";

        // 💡 終極安全比對：因為 GAS 已經從最新一筆開始排，所以 .find() 找到的第一個就是「最後一次的盤點結果」
        const rec = records.find(r => r["安全代碼"] === code && (r["安全區域"] === area || r["安全區域"] === ""));

        body.innerHTML += `
          <tr>
            <td>${area}<br><span class="cabinet-tag">${cabinet}</span></td>
            <td><strong>${name}</strong><br><small>${code}</small></td>
            <td style="text-align:center; font-size:16px;">${rec ? rec["安全數量"] : "-"}</td>
            <td>${rec ? rec["安全效期"] : "-"}</td>
            <td><small>${rec ? (rec["安全時間"] + " / " + rec["安全盤點人"]) : "-"}</small></td>
            <td class="${status === '已完成' ? 'status-done' : 'status-wait'}">${status}</td>
          </tr>
        `;
      });
    }
  </script>
</body>
</html>
