<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <!-- 這一行非常重要，它確保網頁在手機上比例正確，不會縮得小小的 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藥局盤點系統</title>
  <style>
    /* 基礎手機版樣式設定 */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
    h2 { text-align: center; color: #2c3e50; }
    .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    
    /* 表單與按鈕放大，方便手指點擊 */
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    select, input[type="number"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 15px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    button:active { background-color: #2980b9; }
    
    /* 藥品輸入列表的樣式 */
    .drug-item { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
    .drug-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
    .drug-code { font-size: 14px; color: #7f8c8d; margin-bottom: 10px; }
    
    /* 隱藏區塊用的 class */
    .hidden { display: none; }
  </style>
</head>

  <h2>📋 藥局盤點系統</h2>

  <!-- 步驟一：設定區塊 -->
 <!-- 步驟一：設定區塊 -->
  <div id="setup-section" class="card">
    <label for="main-area">1. 選擇大區：</label>
    <select id="main-area" onchange="updateSubArea()">
      <option value="" disabled selected>請先選擇大區...</option>
      <option value="門診">門診</option>
      <option value="門診庫">門診庫</option>
      <option value="B1庫">B1庫</option>
      <option value="中山">中山</option>
    </select>

    <label for="sub-area">2. 選擇細部位置：</label>
    <select id="sub-area">
      <option value="" disabled selected>請先選擇上方的大區</option>
    </select>

    <!-- 保留盤點人的欄位(若需要)，這裡將送出按鈕綁定新邏輯 -->
    <button onclick="startInventory()" style="margin-top: 15px;">開始盤點此位置</button>
  </div>
  <!-- 步驟二：盤點輸入區塊 -->
  <div id="inventory-section" class="card hidden">
    <div id="current-info" style="margin-bottom: 15px; font-weight: bold; color: #e67e22;"></div>
    
    <!-- 藥品清單會由 JavaScript 動態產生在這裡 -->
    <div id="drug-list"></div>

    <button style="background-color: #27ae60;" onclick="submitData()">送出並繼續</button>
    <button style="background-color: #95a5a6; margin-top: 10px;" onclick="backToSetup()">返回重選</button>
  </div>

    // 當大區改變時，自動更新細部位置的下拉選單
    function updateSubArea() {
      const mainArea = document.getElementById("main-area").value;
      const subAreaSelect = document.getElementById("sub-area");

      // 清空舊的選項
      subAreaSelect.innerHTML = '<option value="" disabled selected>請選擇細部位置...</option>';

      // 根據選擇的大區，生成對應的細部位置
      if (areaMapping[mainArea]) {
        areaMapping[mainArea].forEach(sub => {
          const opt = document.createElement("option");
          opt.value = sub;
          opt.innerHTML = sub;
          subAreaSelect.appendChild(opt);
        });
      }
    }

    ];

    // 2. 讓程式自動將陣列轉換為 drugDatabase 物件
    const drugDatabase = {};

    rawExcelData.forEach(row => {
      const code = row[0];
      // 組合顯示名稱：中文名 (英文名)
      const name = row[1] + " (" + row[2] + ")";
      
      // 抓取第 4 個索引(含)之後的所有位置，並排除重複或空白的值
      const locations = [...new Set(row.slice(4))].filter(loc => loc && loc.trim() !== ""); 
      
      locations.forEach(loc => {
        if (!drugDatabase[loc]) {
          drugDatabase[loc] = [];
        }
        // 將藥品塞入對應的位置陣列中
        drugDatabase[loc].push({ code: code, name: name });
      });
    });

    // 3. 網頁載入時，自動產生「位置」的下拉選單
    window.onload = function() {
      const locationSelect = document.getElementById("location");
      
      // 取得所有自動生成的位置名稱並加上排序
      const locations = Object.keys(drugDatabase).sort(); 

      locations.forEach(loc => {
        const opt = document.createElement("option");
        opt.value = loc;
        // 為了方便閱讀，可以加上該位置有幾個藥品
        opt.innerHTML = `${loc} (共 ${drugDatabase[loc].length} 項)`;
        locationSelect.appendChild(opt);
      });
    };

    // 原本的 startInventory, submitData, backToSetup 等函式保留不變
  
    // 切換到盤點畫面
    function startInventory() {
      const desk = document.getElementById("desk").value;
      const loc = document.getElementById("location").value;

      if (!desk || !loc) {
        alert("請先選擇調劑檯與位置！");
        return;
      }

      // 顯示目前盤點資訊
      document.getElementById("current-info").innerText = `目前盤點：${desk} - 位置 ${loc}`;
      
      // 生成藥品輸入框
      const listDiv = document.getElementById("drug-list");
      listDiv.innerHTML = ""; // 清空上次的內容
      
      const drugs = drugDatabase[loc] || [];
      if(drugs.length === 0) {
        listDiv.innerHTML = "<p>此位置沒有設定藥品。</p>";
      } else {
        drugs.forEach(drug => {
          // 建立每個藥品的輸入區塊，inputmode="numeric" 確保手機跳出數字鍵盤
          const html = `
            <div class="drug-item">
              <div class="drug-name">${drug.name}</div>
              <div class="drug-code">代碼：${drug.code}</div>
              <input type="number" id="qty-${drug.code}" data-code="${drug.code}" data-name="${drug.name}" placeholder="請輸入數量" inputmode="numeric" pattern="[0-9]*" min="0">
            </div>
          `;
          listDiv.innerHTML += html;
        });
      }

      // 切換顯示區塊
      document.getElementById("setup-section").classList.add("hidden");
      document.getElementById("inventory-section").classList.remove("hidden");
    }

    // 送出資料到 Google Sheets
    function submitData() {
      const desk = document.getElementById("desk").value;
      const loc = document.getElementById("location").value;
      const inputs = document.querySelectorAll("#drug-list input[type='number']");
      
      let itemsToSubmit = [];
      let hasEmpty = false;

      // 收集輸入的資料
      inputs.forEach(input => {
        const qty = input.value;
        if (qty === "") hasEmpty = true; // 檢查是否有漏填
        
        itemsToSubmit.push({
          drugCode: input.getAttribute("data-code"),
          drugName: input.getAttribute("data-name"),
          qty: qty || 0 // 如果真的沒填，預設為 0
        });
      });

      if (hasEmpty) {
        const confirmEmpty = confirm("有藥品尚未輸入數量，將以 0 計算。確定要送出嗎？");
        if (!confirmEmpty) return;
      }

      // 準備要傳送的 JSON
      const payload = {
        desk: desk,
        location: loc,
        items: itemsToSubmit
      };

      // 顯示 loading 狀態
      const btn = document.querySelector("#inventory-section button");
      btn.innerText = "資料傳送中...";
      btn.disabled = true;

      // 使用 fetch API 傳送資料到 GAS
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payload),
      })
      .then(response => response.json())
      .then(result => {
        if(result.status === "success") {
          alert("✅ 成功送出！請繼續下一個位置。");
          backToSetup(); // 回到首頁準備盤下一個
        } else {
          alert("❌ 發生錯誤：" + result.message);
        }
      })
      .catch(error => {
        alert("連線失敗，請檢查網路狀態。");
      })
      .finally(() => {
        // 恢復按鈕狀態
        btn.innerText = "送出並繼續";
        btn.disabled = false;
      });
    }

    // 返回設定畫面
    function backToSetup() {
      document.getElementById("setup-section").classList.remove("hidden");
      document.getElementById("inventory-section").classList.add("hidden");
      
      // 清空位置選項，讓同事強制重選，但保留「調劑檯」的選擇
      document.getElementById("location").value = ""; 
    }
  </script>
