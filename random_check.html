<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藥局抽盤系統</title>
  <style>
    body { font-family: sans-serif; padding: 15px; background: #f9f9f9; }
    .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
    input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; font-size: 16px; border: 1px solid #ddd; border-radius: 5px; }
    button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 18px; }
    .drug-name { font-weight: bold; color: #2c3e50; font-size: 18px; }
  </style>
</head>
<body>
  <h2>🔎 今日抽盤任務</h2>
  
  <div class="card">
    <label>選擇負責區域：</label>
    <select id="loc-select" style="width:100%; padding:10px;" onchange="loadTasks()">
      <option value="">-- 請選擇 --</option>
      <option value="門診-調劑檯1">門診-調劑檯1</option>
      <option value="門診-冰箱">門診-冰箱</option>
    </select>
  </div>

  <div id="task-list"></div>
  <button id="submit-btn" style="display:none;" onclick="submitData()">確認並上傳結果</button>

  <script>
    const GAS_URL = "您的GAS部署網址";
    let currentTasks = [];

    async function loadTasks() {
      const loc = document.getElementById('loc-select').value;
      const list = document.getElementById('task-list');
      list.innerHTML = "載入中...";
      
      const res = await fetch(GAS_URL + "?action=getTodayTasks&location=" + loc);
      currentTasks = await res.json();
      
      list.innerHTML = currentTasks.length ? "" : "此區域今日無任務 🎉";
      document.getElementById('submit-btn').style.display = currentTasks.length ? "block" : "none";

      currentTasks.forEach(task => {
        list.innerHTML += `
          <div class="card" data-code="${task[1]}" data-name="${task[4]}">
            <div class="drug-name">${task[4]}</div>
            <div>代碼：${task[1]}</div>
            <label>實盤數量：</label>
            <input type="number" class="qty" placeholder="請輸入數量" inputmode="numeric">
            <label>最舊效期：</label>
            <input type="date" class="expiry">
          </div>
        `;
      });
    }

    async function submitData() {
      const cards = document.querySelectorAll('#task-list .card');
      const items = [];
      cards.forEach(c => {
        items.push({
          code: c.dataset.code,
          name: c.dataset.name,
          qty: c.querySelector('.qty').value,
          expiry: c.querySelector('.expiry').value
        });
      });

      const payload = {
        action: "submitRandomCheck",
        location: document.getElementById('loc-select').value,
        user: "盤點同仁", // 之後可改為登入者姓名
        items: items
      };

      await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
      alert("✅ 抽盤結果已成功上傳！");
      location.reload();
    }
  </script>
</body>
</html>
