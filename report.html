<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>藥劑科盤點即時匯總報表</title>
  <style>
    body { font-family: 'Microsoft JhengHei', sans-serif; background: #f0f2f5; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #ddd; font-size: 15px; }
    button { background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
    th { background: #f8f9fa; color: #555; font-weight: bold; }
    .total-row { background: #fffde7; font-weight: bold; }
    .highlight { color: #d32f2f; font-weight: bold; }
  </style>
</head>
<body>

<div class="card">
  <h2>💊 藥品即時匯總查詢</h2>
  <div class="search-box">
    <input type="text" id="drug-query" placeholder="輸入院內碼或商品名 (如: Concor)">
    <button onclick="searchDrug()">🔍 全院/跨區查詢</button>
    <div style="flex-grow:1"></div>
    <select id="main-area-select" onchange="renderAreaReport()">
      <option value="">-- 選擇大區報表 --</option>
      <option value="門診">門診</option>
      <option value="急診">急診</option>
      <option value="藥庫">藥庫</option>
      <option value="中山">中山</option>
      <option value="化療">化療</option>
    </select>
  </div>
</div>

<div id="result-container" class="card" style="display:none;">
  <h3 id="result-title">報表結果</h3>
  <table id="result-table">
    <thead id="table-head"></thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec"; 
let rawData = []; // 原始紀錄

// 🌟 您的核心分類引擎 (請保持與 inventory.html 一致)
function classifySubAreas(cabName, mainArea, unit) {
    if (mainArea === "中山") {
        const u = String(unit || "").toUpperCase();
        if (u === "CAP" || u === "TABL") return ["口服"];
        if (u === "TUBE" || u === "BTL" || u === "SACH") return ["外用"];
        if (u === "AMPU") return ["注射"];
        return ["其他"];
    }
    if (cabName.startsWith("調3")) return ["調劑檯3"];
    if (cabName.startsWith("ADC")) return ["ADC藥櫃"];
    // ... 其餘規則略，請填入您完整的引擎 ...
    return ["調劑檯1, 2, 4"]; 
}

// 載入資料
window.onload = async () => {
    const res = await fetch(GAS_URL + "?action=getRawRecords");
    rawData = await res.json();
    console.log("資料已載入", rawData.length, "筆");
};

// 功能 C & D：單一藥品跨區/大區整合數量
function searchDrug() {
    const query = document.getElementById("drug-query").value.toUpperCase();
    if (!query) return;

    const filtered = rawData.filter(row => row[0].includes(query) || row[1].toUpperCase().includes(query));
    
    document.getElementById("result-container").style.display = "block";
    document.getElementById("result-title").innerText = `🔍 藥品查詢結果: ${query}`;
    
    const head = document.getElementById("table-head");
    head.innerHTML = `<tr><th>大區</th><th>小區</th><th>實際儲位</th><th>數量</th><th>紀錄時間</th></tr>`;
    
    const body = document.getElementById("table-body");
    body.innerHTML = "";
    
    let total = 0;
    filtered.forEach(row => {
        const sub = classifySubAreas(row[4], row[5], row[3]);
        total += parseFloat(row[2]);
        body.innerHTML += `<tr><td>${row[5]}</td><td>${sub}</td><td>${row[4]}</td><td>${row[2]}</td><td>${row[6]}</td></tr>`;
    });
    
    body.innerHTML += `<tr class="total-row"><td colspan="3">全院總計數量</td><td class="highlight">${total}</td><td></td></tr>`;
}

// 功能 A & B：大區下的小區加總報表
function renderAreaReport() {
    const mainArea = document.getElementById("main-area-select").value;
    if (!mainArea) return;

    document.getElementById("result-container").style.display = "block";
    document.getElementById("result-title").innerText = `📊 ${mainArea} - 分區匯總報表`;
    
    // 依據藥品院內碼與小區進行群組加總
    const summary = {};
    rawData.filter(row => row[5] === mainArea).forEach(row => {
        const code = row[0];
        const name = row[1];
        const qty = parseFloat(row[2]);
        const sub = classifySubAreas(row[4], row[5], row[3])[0];
        
        if (!summary[code]) summary[code] = { name: name, subs: {} };
        if (!summary[code].subs[sub]) summary[code].subs[sub] = 0;
        summary[code].subs[sub] += qty;
    });

    const head = document.getElementById("table-head");
    head.innerHTML = `<tr><th>院內碼</th><th>商品名</th><th>分區數量匯總</th><th>大區總計</th></tr>`;
    
    const body = document.getElementById("table-body");
    body.innerHTML = "";

    Object.keys(summary).forEach(code => {
        const item = summary[code];
        let subDetails = Object.entries(item.subs).map(([sub, q]) => `${sub}: ${q}`).join("<br>");
        let areaTotal = Object.values(item.subs).reduce((a, b) => a + b, 0);
        
        body.innerHTML += `<tr>
            <td>${code}</td>
            <td>${item.name}</td>
            <td>${subDetails}</td>
            <td class="highlight">${areaTotal}</td>
        </tr>`;
    });
}
</script>
</body>
</html>
