<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大盤點 - 分區結果報表</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 15px; align-items: center; }
    select, button { padding: 8px 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
    button.btn-export { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
    button.btn-export:hover { background-color: #218838; }
    table { width: 100%; background: white; border-collapse: collapse; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #007bff; color: white; position: sticky; top: 0; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .diff-minus { color: #dc3545; font-weight: bold; } /* 盤虧：紅色 */
    .diff-plus { color: #007bff; font-weight: bold; }  /* 盤盈：藍色 */
    .diff-zero { color: #28a745; }                     /* 帳物相符：綠色 */
    .loading { font-size: 18px; color: #666; font-style: italic; }
  </style>
</head>
<body>

  <div class="header">
    <h2>📊 大盤點分區結果報表</h2>
    <button class="btn-export" onclick="exportToCSV()">📥 匯出當前表格 (CSV)</button>
  </div>

  <div class="controls">
    <label>1. 選擇大區：</label>
    <select id="main-area" onchange="updateSubAreaSelect()">
      <option value="" disabled selected>⏳ 資料載入中...</option>
    </select>

    <label>2. 選擇小區：</label>
    <select id="sub-area" onchange="renderTable()">
      <option value="" disabled selected>請先選擇大區...</option>
    </select>
    
    <label><input type="checkbox" id="show-diff-only" onchange="renderTable()"> 🔍 只顯示有差異品項</label>
  </div>

  <div id="status-msg" class="loading" style="margin-top:15px;">正在連線到資料庫...</div>

  <table id="report-table" style="display:none; margin-top:20px;">
    <thead>
      <tr>
        <th>院內碼</th>
        <th>商品名</th>
        <th>單位</th>
        <th>實際儲位</th>
        <th>系統庫存</th>
        <th>實盤數量</th>
        <th>差異</th>
        <th>盤點人員</th>
        <th>盤點時間</th>
      </tr>
    </thead>
    <tbody id="report-body">
      </tbody>
  </table>

  <script>
    // 🚨 替換成您剛剛重新部署的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypLTxCYzcQJOiVYfqGncfZFeHpy_HBxL5QFWJr9QIsinMMNoKvyLRgPggAR40z7vQH3A/exec"; 
    
    let allRecords = []; // 存放所有盤點總表的資料

    // 💡 欄位索引對照表 (請依照您的「盤點總表」Excel 欄位順序進行修改！)
    // 假設 0=院內碼, 1=商品名, 2=單位, 3=儲位, 4=大區, 5=系統量, 6=實盤量, 7=差異, 8=人員, 9=時間
    const COL = {
      CODE: 0,
      NAME: 1,
      UNIT: 2,
      CAB: 3,
      MAIN_AREA: 4,
      SYS_QTY: 5,
      INV_QTY: 6,
      DIFF: 7,
      USER: 8,
      TIME: 9
    };

    // 🌟 核心分類引擎 (完全移植您修正好的最終版本)
    function classifySubAreas(cabName, mainArea, unit) {
      if (mainArea === "中山") {
        const u = String(unit || "").toUpperCase();
        if (u === "CAP" || u === "TABL") return ["口服"];
        if (u === "TUBE" || u === "BTL" || u === "SACH") return ["外用"];
        if (u === "AMPU") return ["注射"];
        if (cabName === "未設儲位") return ["未設儲位"];
        return ["其他(中山)"];
      }
      
      if (cabName === "未設儲位") return ["未設儲位"];
      if (cabName === "門地下一") return ["門診區地下一層"];
      if (cabName === "住地下一") return ["住院藥局(地下一層)"];

      switch (mainArea) {
        case "門診":
          if (cabName.startsWith("門冰") || cabName.startsWith("冰")) return ["門診冰箱"];
          if (cabName.startsWith("管")) return ["管制藥品櫃"]; 
          if (cabName.startsWith("調3")) return ["調劑檯3"];
          if (cabName.startsWith("ADC")) return ["ADC藥櫃"];
          if (cabName.startsWith("水")) return ["水藥台"];
          if (cabName.startsWith("專案")) return ["專案櫃"];
          if (cabName.startsWith("磨粉區")) return ["磨粉區"];
          if (cabName.startsWith("藥包機")) return ["藥包機"];
          return ["調劑檯1", "調劑檯2", "調劑檯4"];

        case "急診":
          if (cabName === "B1冷凍" || cabName.startsWith("B1冷凍")) return ["B1冷凍"];
          if (cabName.startsWith("ER_")) return ["ER_"];
          const enMatch = cabName.match(/^[a-zA-Z]+/);
          if (enMatch) return [enMatch[0].toUpperCase()]; 
          if (/^[\u4e00-\u9fa5]/.test(cabName)) return [cabName.replace(/\d$/, '')];
          return ["全部品項"];

        case "藥庫":
          if (cabName.includes("心/內")) return ["E3"];
          const rackMatch = cabName.match(/^[a-zA-Z]+[左右]?\d+/);
          if (rackMatch) return [rackMatch[0]]; 
          if (cabName.includes("-")) return [cabName.split("-")[0]];
          return [cabName];

        case "化療":
          return ["全部品項"];

        default:
          return ["全部品項"];
      }
    }

    // 網頁載入時，立刻去抓盤點總表資料
    window.onload = async function() {
      try {
        const res = await fetch(GAS_URL + "?action=getReport");
        const data = await res.json();
        
        if (data.error) {
          alert("錯誤：" + data.error);
          return;
        }

        allRecords = data;
        
        // 抓出所有不重複的大區
        const mainAreas = [...new Set(allRecords.map(row => String(row[COL.MAIN_AREA]).trim()).filter(a => a))];
        
        const mainSelect = document.getElementById("main-area");
        mainSelect.innerHTML = '<option value="" disabled selected>請選擇大區...</option>';
        mainAreas.sort().forEach(area => {
          mainSelect.innerHTML += `<option value="${area}">${area}</option>`;
        });

        document.getElementById("status-msg").style.display = "none";
        document.getElementById("report-table").style.display = "table";

      } catch(err) {
        document.getElementById("status-msg").innerHTML = "❌ 資料載入失敗，請檢查網路或 GAS 網址。";
      }
    };

    // 當大區改變，動態生成小區選單
    function updateSubAreaSelect() {
      const mainArea = document.getElementById("main-area").value;
      const subSelect = document.getElementById("sub-area");
      subSelect.innerHTML = '<option value="" disabled selected>請選擇小區...</option>';
      
      // 讓系統先掃過所有紀錄，看這個大區底下「實際上」存在哪些小區
      let availableSubAreas = new Set();
      allRecords.forEach(row => {
        if (String(row[COL.MAIN_AREA]).trim() === mainArea) {
          const cab = String(row[COL.CAB]).trim() || "未設儲位";
          const unit = String(row[COL.UNIT]).trim();
          
          const subs = classifySubAreas(cab, mainArea, unit);
          subs.forEach(s => availableSubAreas.add(s));
        }
      });

      [...availableSubAreas].sort().forEach(sub => {
        subSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
      });
      
      renderTable(); // 清空表格
    }

    // 渲染報表
    function renderTable() {
      const mainArea = document.getElementById("main-area").value;
      const subArea = document.getElementById("sub-area").value;
      const showDiffOnly = document.getElementById("show-diff-only").checked;
      const tbody = document.getElementById("report-body");
      tbody.innerHTML = "";

      if (!mainArea || !subArea) return;

      allRecords.forEach(row => {
        if (String(row[COL.MAIN_AREA]).trim() !== mainArea) return;
        
        const code = String(row[COL.CODE]).trim();
        const name = String(row[COL.NAME]).trim();
        const unit = String(row[COL.UNIT]).trim();
        const cab = String(row[COL.CAB]).trim() || "未設儲位";
        const sysQty = parseFloat(row[COL.SYS_QTY]) || 0;
        const invQty = parseFloat(row[COL.INV_QTY]) || 0;
        const diff = parseFloat(row[COL.DIFF]) || 0;
        const user = String(row[COL.USER]).trim();
        const time = String(row[COL.TIME]).trim();

        // 用引擎判斷這筆資料屬不屬於選擇的小區
        const subs = classifySubAreas(cab, mainArea, unit);
        if (!subs.includes(subArea)) return;

        // 檢查「只顯示差異」的條件
        if (showDiffOnly && diff === 0) return;

        // 決定差異數字的顏色
        let diffClass = "diff-zero";
        let diffText = "0";
        if (diff < 0) { diffClass = "diff-minus"; diffText = diff; }
        if (diff > 0) { diffClass = "diff-plus"; diffText = "+" + diff; }

        tbody.innerHTML += `
          <tr>
            <td>${code}</td>
            <td>${name}</td>
            <td>${unit}</td>
            <td>${cab}</td>
            <td>${sysQty}</td>
            <td>${invQty}</td>
            <td class="${diffClass}">${diffText}</td>
            <td>${user}</td>
            <td>${time}</td>
          </tr>
        `;
      });
    }

    // 匯出 CSV 檔案
    function exportToCSV() {
      const table = document.getElementById("report-table");
      let csvContent = "\uFEFF"; // 加入 BOM 避免 Excel 中文亂碼
      
      for (let i = 0; i < table.rows.length; i++) {
        let rowData = [];
        for (let j = 0; j < table.rows[i].cells.length; j++) {
          let cellText = table.rows[i].cells[j].innerText.replace(/"/g, '""');
          rowData.push('"' + cellText + '"');
        }
        csvContent += rowData.join(",") + "\n";
      }

      const mainArea = document.getElementById("main-area").value || "未選大區";
      const subArea = document.getElementById("sub-area").value || "未選小區";
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", `盤點報表_${mainArea}_${subArea}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
